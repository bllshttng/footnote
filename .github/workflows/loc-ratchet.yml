name: loc-ratchet

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: loc-ratchet-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  loc-ratchet:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run LOC ratchet
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.base_ref }}
        run: bash scripts/ci/loc-ratchet.sh

  self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run loc-ratchet test harness
        run: bash tests/ci/test_loc_ratchet.sh
