name: session-url-scan

# Blocks claude.ai/code session URLs (the harness's default `Claude-Session:`
# commit trailer, or a bare paste) from landing in a PR's commit messages, title,
# or body. A pushed session URL is irreversible (force-push does not retract it),
# so this must gate BEFORE merge.
#
# This is a SEPARATE workflow from internal-refs (not a job in it) on purpose:
# internal-refs uses a workflow-wide `paths:` filter (prose paths only), but a
# commit-message or PR-body leak can arrive on ANY PR regardless of which files
# it touches. So this workflow has no `paths:` filter - it runs on every PR.
on:
  pull_request:

concurrency:
  group: session-url-scan-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-no-session-urls:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # fetch-depth: 0 so the PR base SHA is present and the diff-scoped commit
      # range base..head is resolvable; the script fails loud if it is not.
      - name: Checkout (full history for the diff-scoped commit range)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # PR-controlled text (title/body) reaches the script via env ONLY - never
      # interpolated inline into `run:`, which would be a shell-injection hole.
      - name: No claude.ai/code session URLs in commits / title / body
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: bash scripts/ci/check-no-session-urls.sh
