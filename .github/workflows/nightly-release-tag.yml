name: nightly-release-tag

# Cut the NEXT patch release: bump every version file in lockstep, tag it, and
# dispatch the (still one-click-gated) publish workflows. Runs ONLY on manual
# dispatch - the nightly cron was removed because with 30-50 PRs/day every night
# had commits, so it minted a bump + tag every single night while publishing
# stayed behind the one-click gate. Tags climbed ahead of actual releases
# (v0.3.0, v0.3.1 with nothing on PyPI). Releases are deliberate now: dispatch
# this when you actually want to ship. The "no commits since the last tag" guard
# below still makes a redundant dispatch a safe no-op.
#
# It never publishes on its own: it pushes a bump commit + tag, then explicitly
# dispatches release-wheels. That workflow still waits at the one-click `release`
# environment approval before the PyPI upload. Autonomy ends at the click.

on:
  workflow_dispatch:

# Serialize runs so two nights (or a manual + scheduled overlap) never race on
# the tag. Queue rather than cancel: a queued run re-evaluates the guards and
# no-ops if the first already tagged.
concurrency:
  group: nightly-release-tag
  cancel-in-progress: false

permissions:
  contents: write # push the bump commit + tag
  actions: write # gh workflow run (dispatch release-wheels)

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags: git describe and rev-list both need them.
          fetch-depth: 0

      - name: Compute next version, tag, dispatch release workflows
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 0. Release only from the default branch. A workflow_dispatch on a
          #    feature branch would otherwise push a bump + a public tag from
          #    unmerged code (an immutable release cut from a non-main commit).
          branch="${GITHUB_REF_NAME}"
          default_branch="${DEFAULT_BRANCH:-main}"
          if [ "$branch" != "$default_branch" ]; then
            echo "::error::refusing to release from non-default branch '${branch}'; run this on '${default_branch}'"
            exit 1
          fi

          # 1. Latest v* tag. No tag at all -> a human must cut the first release;
          #    the nightly never mints the first one (unfetched tags or a
          #    never-released fork both land here and both need a human).
          latest="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
          if [ -z "$latest" ]; then
            echo "::error::no v* release tag found - cut the first release manually (see runbook)"
            exit 1
          fi
          echo "latest release tag: $latest"

          # 2. No new commits since the tag -> logged no-op, no artifacts.
          #    Self-stabilizing: each release tags the bump commit itself, so
          #    the bump never re-triggers the next night.
          count="$(git rev-list "${latest}..HEAD" --count)"
          if [ "$count" -eq 0 ]; then
            echo "no new commits since ${latest} - nothing to release"
            exit 0
          fi
          echo "${count} commit(s) since ${latest}"

          # 3. Compute the release version = max(source version, tag's patch bump).
          #    The source files are the version source of truth. When a minor bump
          #    landed in-PR (source 0.3.0 while the last tag is still v0.2.1,
          #    before the operator cuts v0.3.0) a pure tag-patch bump would derive
          #    v0.2.2 and REWRITE the source DOWN to 0.2.2. Taking the max cuts the
          #    already-declared 0.3.0 instead. No zero-padding assumptions.
          tag_ver="${latest#v}"
          major="${tag_ver%%.*}"
          rest="${tag_ver#*.}"
          minor="${rest%%.*}"
          patch="${rest#*.}"
          tag_bump="${major}.${minor}.$((patch + 1))"
          src_ver="$(sed -nE 's/^__version__ = "(.*)"$/\1/p' cli/src/fno/__init__.py)"
          new_ver="$(printf '%s\n%s\n' "$src_ver" "$tag_bump" | sort -V | tail -1)"
          next="v${new_ver}"

          # Idempotent re-run: a prior night tagged then died downstream.
          # Skip cleanly - recovery is re-dispatch, never re-tag.
          if git rev-parse -q --verify "refs/tags/${next}" >/dev/null; then
            echo "tag ${next} already exists - skipping (idempotent re-run)"
            exit 0
          fi
          echo "next version: ${next}"

          # 4. Bump the version in every file that ships it, commit [skip ci],
          #    push with rebase-retry (merges land constantly). Fetch+reset at
          #    the top of each attempt so we always build on the freshest origin.
          #    All three files stay in lockstep: the v* tag drives release-wheels
          #    AND crates-publish AND release-binaries, so the wheel and both
          #    Rust crates must read the same version at tag time (a crate left
          #    behind fails crates-publish or ships a mislabeled binary).
          PY_FILE="cli/src/fno/__init__.py"
          CRATE_FILES="crates/fno/Cargo.toml crates/fno-agents/Cargo.toml"

          apply_bump() {
            sed -i -E "s/^__version__ = \".*\"/__version__ = \"${new_ver}\"/" "$PY_FILE"
            grep -q "^__version__ = \"${new_ver}\"$" "$PY_FILE" \
              || { echo "::error::failed to set __version__ to ${new_ver} in ${PY_FILE}"; return 1; }
            for cf in $CRATE_FILES; do
              # Each Cargo.toml has exactly one top-level `version = "..."` (the
              # [package] version); dependency versions are never at column 0.
              sed -i -E "s/^version = \".*\"/version = \"${new_ver}\"/" "$cf"
              grep -q "^version = \"${new_ver}\"$" "$cf" \
                || { echo "::error::failed to set version to ${new_ver} in ${cf}"; return 1; }
              # Keep the lockfile's own package entry in step so cargo publish /
              # the frozen build in CI do not choke on a stale lock.
              cargo update --manifest-path "$cf" -p "$(basename "$(dirname "$cf")")" --precise "${new_ver}" >/dev/null 2>&1 || true
            done
          }

          bump_sha=""
          for attempt in 1 2 3 4 5; do
            git fetch origin "$branch"
            git reset --hard "origin/${branch}"
            apply_bump || exit 1
            # A prior half-run may have pushed the bump commit but failed to push
            # the tag: origin already carries ${new_ver}, so there is nothing to
            # commit. Adopt the current HEAD (versions hold through later merges)
            # and proceed straight to tagging - never abort on an empty commit.
            if git diff --quiet; then
              bump_sha="$(git rev-parse HEAD)"
              echo "bump to ${new_ver} already on ${branch} (${bump_sha}) - proceeding to tag"
              break
            fi
            git add -A
            git commit -m "chore(release): ${new_ver} [skip ci]"
            cand="$(git rev-parse HEAD)"
            if git push origin "HEAD:${branch}"; then
              bump_sha="$cand"
              echo "pushed bump commit ${bump_sha} (attempt ${attempt})"
              break
            fi
            echo "push attempt ${attempt} lost the race - retrying"
          done

          # Retries exhausted -> fail RED with no tag. A tag must never point at
          # an unpushed or non-main commit.
          if [ -z "$bump_sha" ]; then
            echo "::error::exhausted bump-commit push retries; no tag pushed, no release dispatched"
            exit 1
          fi

          # 5. Tag the CAPTURED bump SHA (not a re-resolved HEAD - a merge may
          #    have landed mid-run), push the tag.
          git tag "${next}" "${bump_sha}"
          git push origin "${next}"
          echo "tagged ${bump_sha} as ${next}"

          # 6. Explicitly dispatch the tag-gated release workflows. A tag pushed
          #    with GITHUB_TOKEN fires no `on: push` workflows (anti-loop rule),
          #    so these dispatches are load-bearing - the tag-push event alone
          #    builds nothing. Both publish jobs stay approval-gated by the
          #    `release` environment (autonomy still ends at the click). set -e
          #    fails the nightly red if a dispatch call fails, so a "green"
          #    nightly can never silently skip a channel.
          gh workflow run release-wheels.yml --ref "${next}" -f publish=true
          echo "dispatched release-wheels at ${next} with publish=true"
          gh workflow run crates-publish.yml --ref "${next}" -f confirm=true
          echo "dispatched crates-publish at ${next} with confirm=true"

          # release-binaries only ATTACHES on a real tag PUSH (its release job is
          # gated `github.event_name == 'push'` - a dispatch, even at a v* tag,
          # deliberately stops at build artifacts for inspection). A GITHUB_TOKEN
          # tag push cannot fire that, so the nightly cannot auto-attach the
          # standalone fno-agents binaries. The PyPI wheel (the bootstrap channel)
          # and crates.io are covered above; standalone-binary attachment for a
          # nightly tag needs a maintainer to re-run release-binaries from the tag
          # (or a PAT push that fires on: push). Called out here, not silently
          # skipped.
          echo "::notice::nightly does not auto-attach standalone binaries for ${next}; re-run release-binaries from the tag if needed"
