# Entries in this file are the EXCEPTION LEDGER only.
# They do NOT represent the live LOC total; they record each PR that was
# granted a loc-exception: borrow against the baseline.
#
# Cumulative debt at any point in time:
#   cumulative = (live_count at HEAD) - baseline.executable_loc
# The script computes this live; do not maintain it here by hand.
#
# Baseline re-anchor rule:
#   If the manifest scope materially changes (include paths added or removed),
#   add a new baseline: block with a dated note explaining the change.
#   Keep the old baseline block in place for audit trail. The script reads
#   only the FIRST baseline.executable_loc it encounters, so the new block
#   must come before the old one.
#
# Entry format (must parse with the script's line-oriented YAML parser):
#   - date:   YYYY-MM-DD
#     pr:     <PR number>
#     branch: <branch name>
#     delta:  <positive integer>
#     reason: "<rationale>"

