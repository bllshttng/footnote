# cli/src/fno/events/schema.yaml
# Single source of truth for events.jsonl envelope shape across footnote.
# Lives beside its Python loader (fno.events) and ships as package data.
#
# Both validators load this file:
#   - cli/src/fno/events/__init__.py (Python; imports raise SchemaUnavailableError if absent)
#   - scripts/lib/events-validate.sh (bash; caches at /tmp/events-schema-$$.cache via yq or python3 fallback)
#
# Adding a new event type:
#   1. Add an entry under `event_types`.
#   2. If gate-flipping, add the gate name to `gates`.
#   3. Add a fixture record to cli/tests/events/parity_corpus.jsonl so
#      both validators agree on the shape.
#   4. CI parity test (test_validator_parity.py) runs both validators
#      against the corpus; both must give the same verdict on every record.
#
# Removing an event type:
#   Add a `deprecated: <UTC ISO8601>` marker to the entry rather than
#   deleting it outright. test_no_undocumented_deletions enforces the marker
#   shape; downstream consumers get one release of warning before removal.

version: 1

envelope:
  required: [ts, type, source, data]
  properties:
    ts:
      type: string
      format: rfc3339-utc
      description: "UTC RFC3339 timestamp like 2026-05-07T09:30:42Z"
    type:
      type: string
      description: "Event type name; must match an entry in event_types"
    source:
      type: string
      # x-2901: single unified envelope. 'active-backlog' added (real emitter at
      # daemon.rs). Per-agent worker sources (worker:<id>, stream-worker:<id>) are
      # pattern sources, validated by both the Python and bash validators via the
      # `patterns` list below (previously only the parity-script layer checked them).
      enum: [target, megawalk, megatron, abi-loop, hook, subagent, migration, test, backlog, daemon, observer, skill_diff, active-backlog]
      patterns:
        - '^(worker|stream-worker):.+$'
      description: "Producer identity; consumers route on this. A fixed-string source from the enum, or a per-agent worker matching one of `patterns`."
    data:
      type: object
      description: "Per-type payload; see event_types[].data"

# Allowed gate names for phase_transition events. Adding a gate without
# updating set_gate.sh's allowlist will fail the parity test.
gates:
  - quality_check_passed
  - output_validated
  - ledger_updated
  - artifact_shipped
  - external_review_passed
  - browser_testing_passed
  - memory_pass_passed
  - deferrals_captured
  - frontend_craft_passed
  - phase_init       # not strictly a gate; retained for back-compat with phase_init events
  - phase_rolled_back

event_types:

  - name: phase_transition
    description: "A gate flipped to true (gate_bearing=true) OR an audit-only phase boundary crossed (gate_bearing=false)."
    sources: [target, megawalk, abi-loop, hook]
    data:
      required: [gate_bearing, phase, nonce, session_id]
      properties:
        gate_bearing:
          type: boolean
          description: "True if this transition flipped a state-file gate bool; false for audit-only phase boundaries."
        gate:
          type: string
          description: "Gate name (e.g. ledger_updated). Required when gate_bearing=true; absent otherwise."
        phase:
          type: string
          description: "Phase identifier (e.g. register, review, ship)."
        nonce:
          type: string
          description: "provenance_nonce from the session's state file. Stop hook matches on this."
        session_id:
          type: string
          description: "target or megawalk session id."
    consumers: [hooks/target-stop-hook.sh, hooks/megawalk-stop-hook.sh]

  - name: child_promise
    description: "A target child session emitted <promise> at COMPLETE. Megawalk verifies before advancing."
    sources: [target]
    data:
      required: [session_id, nonce]
      properties:
        session_id:
          type: string
        nonce:
          type: string
    consumers: [hooks/megawalk-stop-hook.sh]

  - name: review_attestation
    description: "A local reviewer (sigma | code-review | declare) completed a head-pinned review pass. loop-check reads this as gate evidence for a config.review.reviewers entry (x-e703, Phase 2): the entry is satisfied when reviewer matches, head_sha == current HEAD, and verdict == pass. Head-pinning is mandatory - a pass on an old commit must not count after new commits land."
    sources: [target, subagent, hook, test]
    data:
      required: [reviewer, head_sha, verdict]
      properties:
        reviewer:
          type: string
          description: "The reviewer name matching a config.review.reviewers entry (sigma | code-review | declare; a leading '/' is stripped by both parsers)."
        head_sha:
          type: string
          description: "The git HEAD sha the reviewer reviewed. loop-check head-pins on this: it must equal the current HEAD or the attestation does not satisfy the gate."
        verdict:
          type: string
          enum: [pass, fail]
          description: "pass satisfies the gate entry; fail (or an absent attestation) holds it (fail closed)."
        session_id:
          type: string
          description: "Emitting session id (optional; observability)."
    consumers: [fno-agents loop-check]

  - name: mission_started
    description: "Megatron mission entered RUNNING state."
    sources: [megatron]
    data:
      required: [mission_id]
      properties:
        mission_id:
          type: string
    consumers: [postmortem]

  - name: wave_advanced
    description: "Megatron mission completed a wave; new wave dispatched."
    sources: [megatron]
    data:
      required: [mission_id, wave, child_session_ids]
      properties:
        mission_id:
          type: string
        wave:
          type: integer
        child_session_ids:
          type: array
          items: { type: string }
    consumers: [postmortem]

  - name: mission_complete
    description: "Megatron mission reached terminal status (done|failed|cancelled)."
    sources: [megatron]
    data:
      required: [mission_id, status]
      properties:
        mission_id:
          type: string
        status:
          type: string
          enum: [done, failed, cancelled]
    consumers: [postmortem]

  - name: completion_artifact_write_failed
    description: "write_mission_complete raised an exception when writing the aggregated completion artifact. The mission status flip already committed; this event is telemetry only."
    sources: [megatron]
    data:
      required: [mission_id, reason]
      properties:
        mission_id:
          type: string
          description: "The mission whose artifact write failed."
        reason:
          type: string
          description: "str(exception) from the failed write_mission_complete call."
    consumers: [operator]

  - name: completion_file_corrupt
    description: "A wave-completion JSON file could not be parsed. The wave is treated as not-yet-complete until the file is fixed or replaced."
    sources: [megatron]
    data:
      required: [path, reason]
      properties:
        path:
          type: string
          description: "Absolute path to the corrupt completion file."
        reason:
          type: string
          description: "Error message from json.JSONDecodeError or OSError, or a structured note like 'non-mapping json top-level: list'."
    consumers: [operator]

  - name: completion_schema_unknown
    description: "A wave-completion JSON record carried a schema_version greater than the consumer understands. The record still parses (additive evolution); telemetry exists so operators can detect producer/consumer drift."
    sources: [megatron]
    data:
      required: [observed_version, known_max, path]
      properties:
        mission_id:
          type: string
          description: "The mission_id from the completion record (best-effort)."
        observed_version:
          type: integer
          description: "schema_version read from the record."
        known_max:
          type: integer
          description: "Highest schema_version this consumer understands (CURRENT_COMPLETION_SCHEMA_VERSION)."
        path:
          type: string
          description: "Absolute path to the completion file."
    consumers: [operator]

  - name: completion_schema_invalid
    description: "A wave-completion JSON record carried a schema_version that is not coercible to an integer (string, null, list, ...). Treated as schema_version: 0 and the record still parses; telemetry exists so operators can detect malformed producers."
    sources: [megatron]
    data:
      required: [observed_raw, path]
      properties:
        mission_id:
          type: string
          description: "The mission_id from the completion record (best-effort)."
        observed_raw:
          type: string
          description: "repr() of the malformed schema_version value."
        path:
          type: string
          description: "Absolute path to the completion file."
    consumers: [operator]

  - name: manifest_baselined
    description: "Megatron stamped the mission's first manifest sha256 baseline (manifest_sha256 transition from None -> sha). Marks the start of dispatching for that mission; subsequent iterations compare fresh sha against this baseline to detect operator mutation. Emitted once per mission via _emit_manifest_event in megatron/loop.py."
    sources: [megatron]
    data:
      required: [mission_id, sha_short]
      properties:
        mission_id:
          type: string
          description: "The mission_id whose manifest was baselined."
        sha_short:
          type: string
          description: "First 12 hex chars of the manifest sha256 baseline."
    consumers: [operator]

  - name: manifest_mutated
    description: "Megatron detected that the manifest's sha256 diverged from the stored baseline (stored_sha != fresh_sha). Mission auto-paused with paused_reason=manifest_mutated:stored_sha=...:fresh_sha=...; operator must reconcile or rebaseline before dispatch resumes."
    sources: [megatron]
    data:
      required: [mission_id, stored_sha_short, fresh_sha_short]
      properties:
        mission_id:
          type: string
          description: "The mission_id whose manifest mutated mid-run."
        stored_sha_short:
          type: string
          description: "First 12 hex chars of the previously baselined manifest sha256."
        fresh_sha_short:
          type: string
          description: "First 12 hex chars of the manifest sha256 read on the iteration that detected the drift."
    consumers: [operator]

  - name: mission_complete_emit_failed
    description: "Stop hook deferred a mission completion emit because a precondition was not yet met (most commonly: pr_url not yet captured in target-state.md after a Phase-6 race). Best-effort forensic event written to hook-events.jsonl; the next stop-hook invocation retries the emit. Pairs with the <help reason=\"mission-pr-url-missing\"> stderr signal."
    sources: [hook]
    data:
      required: [mission_id, reason]
      properties:
        mission_id:
          type: string
          description: "The mission whose completion emit was deferred."
        reason:
          type: string
          description: "Why the emit deferred (e.g. pr_url_missing). Free-form string scoped to the stop hook's emit_mission_complete_if_needed branch."
    consumers: [postmortem]

  - name: mission_handoff_unreadable
    description: "Stop hook attempted to read .fno/HANDOFF.md to seed the discoveries field in the mission completion JSON but could not. Best-effort forensic event written to hook-events.jsonl alongside the completion emit; does not block completion. See plan 2026-05-13-megatron-discoveries-field."
    sources: [hook]
    data:
      required: [mission_id, reason]
      properties:
        mission_id:
          type: string
          description: "The mission whose HANDOFF.md could not yield a discoveries section."
        reason:
          type: string
          enum: [file_not_found, file_unreadable, file_empty, no_sections_found]
          description: "Why the helper could not extract content."
    consumers: [postmortem]

  - name: subagent_spawn
    description: "Existing trust-boundary event; retained verbatim for back-compat."
    sources: [hook, target, megawalk]
    data:
      required: [agent_name, provider_id, cli]
      properties:
        agent_name: { type: string }
        provider_id: { type: string }
        cli: { type: string }
    consumers: [fno-agents verify-evidence]

  - name: subagent_complete
    description: "Existing trust-boundary event; retained verbatim."
    sources: [hook, target, megawalk]
    data:
      required: [agent_name]
      properties:
        agent_name: { type: string }
        exit_code:
          description: "Subagent process exit code; integer or 'null' string token (jq -e rejects bare null)"
    consumers: [fno-agents verify-evidence]

  - name: phase_init
    description: "Existing event from emit-gate-transition.sh / events.sh::emit_event_raw. Retained for back-compat."
    sources: [target, hook]
    data:
      required: [phase, nonce, session_id]
      properties:
        phase: { type: string }
        nonce: { type: string }
        session_id: { type: string }
    consumers: [hooks/target-stop-hook.sh]

  - name: phase_rolled_back
    description: "Existing event from set_gate rollback path. Retained for back-compat."
    sources: [hook]
    data:
      required: [gate, reason, nonce, session_id]
      properties:
        gate: { type: string }
        reason: { type: string }
        nonce: { type: string }
        session_id: { type: string }
    consumers: [postmortem]

  - name: transcript_audit_failed
    description: "An external-state audit (verify-review-replies, verify-pr-merged) found that a gate's claimed outcome does not match the observable world. Emitted with rc=1 from the verifier; stop hook reads it as belt-and-braces evidence of the flip-back."
    sources: [hook]
    data:
      required: [gate, reason]
      properties:
        gate:
          type: string
          description: "Gate or audit category (e.g. external_review_passed when verify-review-replies flips a state-file gate back; auto_merge_outcome when verify-pr-merged blocks the promise without flipping a bool)."
        reason:
          type: string
          description: "Short audit-failure reason like missing_reply_to_reviewer or pr_closed_without_merge. Verifier-specific; not enumerated to keep the writer free to surface novel evidence."
        pr_number:
          description: "PR number the audit referenced (integer or string)."
        reviewer:
          type: string
          description: "External reviewer login when applicable (verify-review-replies)."
        last_review_at:
          type: string
          format: rfc3339-utc
          description: "Reviewer's most recent submitted_at timestamp."
        session_id:
          type: string
        nonce:
          type: string
    consumers: [postmortem]

  - name: polling_external_review
    description: "Emitted by /pr check at every external-review check tick. Counted as the fifth thrash-fingerprint signal so polling iterations register as progress and the thrash detector does not force-cancel the loop while waiting for a slow external reviewer."
    sources: [target, subagent, hook]
    data:
      required: [pr_number, reviewer_bot, wait_kind, session_id]
      properties:
        pr_number:
          description: "GitHub PR number being polled. Integer or string accepted."
        reviewer_bot:
          type: string
          description: "Identity of the awaited external reviewer (e.g. gemini-code-assist[bot])."
        wait_kind:
          type: string
          enum: [cron, inline]
          description: "Whether the tick fired from a CronCreate-scheduled prompt or the immediate inline check."
        session_id:
          type: string
          description: "target session id."
        next_check_at:
          type: string
          format: rfc3339-utc
          description: "Next scheduled poll time. The 30-minute exemption window in check_no_progress_thrash reads this."
        nonce:
          type: string
          description: "Optional provenance_nonce; tie-back to a session if provided."
    consumers: [hooks/target-stop-hook.sh]

  - name: reconcile_backfill_wrote
    description: "fno megatron reconcile --backfill wrote a missing completion JSON for a confirmed-merged PR. Forensic event: the file is the source of truth, this event is best-effort telemetry."
    sources: [megatron]
    data:
      required: [mission_id, wave, project, pr_url, commit_sha]
      properties:
        mission_id:
          type: string
          description: "Mission whose completion was backfilled."
        wave:
          type: integer
          description: "Wave number the backfilled project belongs to."
        project:
          type: string
          description: "Canonical project name (post-resolve)."
        pr_url:
          type: string
          description: "GitHub PR URL the backfill payload references."
        commit_sha:
          type: string
          description: "Merge commit SHA captured from gh."
    consumers: [operator]

  - name: cost_subprocess_failed
    description: |
      Emitted when register_session_cost's session-cost.py subprocess returns
      non-zero. The direct-JSON fallback still writes to ledger.json; this
      event is the forensic trail.
    sources: [abi-loop, hook]
    data:
      required:
        - session_id
        - returncode
        - stderr_snippet
        - fallback_succeeded
      properties:
        session_id:
          type: string
          description: "The footnote session ID passed to register_session_cost."
        returncode:
          type: integer
          description: "Exit code (or signal-negated value) returned by session-cost.py subprocess."
        stderr_snippet:
          type: string
          description: "First 4KB of session-cost.py stderr, or empty string if none."
        fallback_succeeded:
          type: boolean
          description: "True when the direct-JSON fallback ledger write succeeded after the subprocess failure."
        cost_usd:
          type: number
          description: "Cost in USD attributed to this session (optional; present when known)."
        tokens:
          type: integer
          description: "Token count for this session (optional; present when known)."
        provider_id:
          type: string
          description: "Provider ID this cost is attributed to (optional)."
        account_id:
          type: string
          description: "Human-friendly account label (optional)."
    consumers: [operator]

  - name: graph_status_drift
    description: |
      Emitted when an Entry is deserialized with a persisted `_status`
      value that differs from the computed derivation (e.g. legacy
      graph.json with stale field). The computed value wins; this
      event records the drift for forensic audit.
    sources: [abi-loop, migration, subagent]
    data:
      required:
        - entry_id
        - persisted
        - computed
      properties:
        entry_id:
          type: string
          description: "The id field of the Entry whose persisted _status diverged."
        persisted:
          type: string
          description: "The _status value read from disk."
        computed:
          type: string
          description: "The _status value derived from the entry's own fields."
    consumers: [operator]

  - name: phase_0_decision
    description: "Phase 0 measurement spike completed; gate decision recorded before any daemon implementation lands."
    sources: [target, subagent]
    data:
      required: [ratio, decision, evidence_path]
      properties:
        ratio:
          type: number
          description: "Aggregate abi_wall_seconds / phase_wall_seconds ratio across sampled sessions."
        decision:
          type: string
          enum: [abort_daemon, reads_only_v1, full_v1]
          description: "Gate outcome: abort_daemon (<15%), reads_only_v1 (15-30%), full_v1 (>=30%)."
        evidence_path:
          type: string
          description: "Path to the decision artifact (e.g., .fno/measurements/YYYY-MM-DD-abi-overhead.md)."
    consumers: [operator]

  - name: graph_reloaded
    description: |
      Emitted by the megawalk walker when a mid-loop mtime check detects
      graph.json or its sha256 sidecar has changed; the entry list has
      been reloaded.
    sources: [megawalk]
    data:
      required: [old_count, new_count, mtime_ns]
      properties:
        old_count:
          type: integer
          description: "Number of graph entries before the reload."
        new_count:
          type: integer
          description: "Number of graph entries after the reload."
        mtime_ns:
          type: integer
          description: "st_mtime_ns of graph.json at the time of reload (may be null if file was missing)."
        sidecar_mtime_ns:
          type: integer
          description: "st_mtime_ns of graph.json.sha256 at the time of reload (may be null; optional)."
    consumers: [operator]

  - name: graph_reload_failed
    description: |
      Emitted by the megawalk walker when a mid-loop reload attempt
      raised GraphCorruptionError, JSONDecodeError, or OSError; cached
      graph_entries preserved this tick.
    sources: [megawalk]
    data:
      required: [error_kind, mtime_ns]
      properties:
        error_kind:
          type: string
          description: "Exception class name (GraphCorruptionError, JSONDecodeError, or OSError)."
        mtime_ns:
          type: integer
          description: "st_mtime_ns of graph.json that triggered the failed reload attempt (may be null if missing)."
        sidecar_mtime_ns:
          type: integer
          description: "st_mtime_ns of graph.json.sha256 at the time of the failed reload (may be null; optional)."
        detail:
          type: string
          description: "str(exc) truncated to 200 chars (optional)."
    consumers: [operator]

  - name: integrity_warning
    description: "Forensic notice that a gate verification path accepted a degraded input. Non-blocking but auditable."
    sources: [target, abi-loop, hook]
    data:
      required: [kind, phase, session_id, artifact_path]
      properties:
        kind:
          type: string
          enum: [missing_nonce_legacy_accepted]
          description: "Which degraded-input variant was accepted."
        phase:
          type: string
          description: "Phase being verified (e.g. ship, review)."
        session_id:
          type: string
          description: "Session ID from the state file at verify time."
        artifact_path:
          type: string
          description: "Absolute or relative path to the artifact that was accepted without a nonce."
    consumers: [operator]

  - name: done_race_collision
    description: "Two fno done calls landed on the same node; second saw _status already done."
    sources: [abi-loop]
    data:
      required: [node_id, first_completed_at, second_attempt_at]
      properties:
        node_id:
          type: string
          description: "The backlog node id that was already done."
        first_completed_at:
          type: string
          description: "The completed_at timestamp already stored in the graph entry."
        second_attempt_at:
          type: string
          description: "UTC ISO8601 timestamp of the second fno done call."
    consumers: [operator]

  - name: backlog_done_refused
    description: "fno backlog done refused to close a node because no merged/green-CI evidence was found."
    sources: [backlog]
    data:
      required: [node_id, pr_number, reason]
      properties:
        node_id:
          type: string
          description: "The backlog node id that was not closed."
        pr_number:
          type: integer
          description: "The first referenced PR number that was checked."
        reason:
          type: string
          description: "Human-readable reason for the refusal (e.g. PR state, CI bucket summary)."
    consumers: [operator]

  - name: backlog_done_forced
    description: "fno backlog done closed a node via --force --reason, bypassing the gh cross-check."
    sources: [backlog]
    data:
      required: [node_id, force_reason]
      properties:
        node_id:
          type: string
          description: "The backlog node id that was force-closed."
        force_reason:
          type: string
          description: "The --reason text provided by the operator."
        pr_number:
          type: integer
          description: "The first referenced PR number (if any)."
        pr_state:
          type: string
          description: "The gh-reported state of the PR at force-close time (OPEN/CLOSED/MERGED/UNKNOWN)."
    consumers: [operator]

  - name: claim_acquired
    description: "A work-claim was acquired on a key. First write to .fno/claims/<key>.lock."
    sources: [abi-loop, target, megawalk, megatron, hook]
    data:
      required: [key, holder, pid, host, acquired_at]
      properties:
        key:
          type: string
          description: "Claim key (e.g. node:ab-1234abcd, fleet:<mission-id>)."
        holder:
          type: string
          description: "Symbolic owner string (e.g. target-session:<sid>)."
        pid:
          type: integer
          description: "Holder process PID at acquire time."
        host:
          type: string
          description: "Host (socket.gethostname) at acquire time."
        acquired_at:
          type: integer
          description: "Epoch milliseconds, UTC."
        expires_at:
          type: integer
          description: "Epoch ms for TTL claims; absent or null for PID-liveness claims."
        reason:
          type: string
          description: "Optional human-readable context (max 512 chars)."
    consumers: [operator]

  - name: claim_released
    description: "A claim was released by its owner. Lock file unlinked."
    sources: [abi-loop, target, megawalk, megatron, hook]
    data:
      required: [key, holder, pid, host, acquired_at, duration_held_ms]
      properties:
        key:
          type: string
        holder:
          type: string
        pid:
          type: integer
        host:
          type: string
        acquired_at:
          type: integer
        expires_at:
          type: integer
        duration_held_ms:
          type: integer
          description: "Milliseconds between acquire and release."
    consumers: [operator]

  - name: claim_refreshed
    description: "A TTL claim's expires_at was extended by its owner."
    sources: [abi-loop, target, megawalk, megatron]
    data:
      required: [key, holder, pid, host, acquired_at, expires_at]
      properties:
        key:
          type: string
        holder:
          type: string
        pid:
          type: integer
        host:
          type: string
        acquired_at:
          type: integer
        expires_at:
          type: integer
        previous_expires_at:
          type: integer
          description: "expires_at before this refresh; null if was PID-liveness."
    consumers: [operator]

  - name: claim_stale_reclaimed
    description: "A stale claim was recovered by a new holder. Old file archived to .expired/."
    sources: [abi-loop, target, megawalk, megatron]
    data:
      required: [key, holder, pid, host, acquired_at, previous_holder, previous_pid]
      properties:
        key:
          type: string
        holder:
          type: string
          description: "New holder taking over."
        pid:
          type: integer
        host:
          type: string
        acquired_at:
          type: integer
        expires_at:
          type: integer
        previous_holder:
          type: string
          description: "Holder whose claim was reclaimed."
        previous_pid:
          type: integer
          description: "PID of the dead/expired holder."
    consumers: [operator]

  - name: claim_force_overridden
    description: "Operator administratively dropped a claim regardless of owner."
    sources: [abi-loop, hook]
    data:
      required: [key, override_reason]
      properties:
        key:
          type: string
        override_reason:
          type: string
          description: "Non-empty rationale for the override."
        previous_holder:
          type: string
          description: "Holder before override; absent if key was already free."
        previous_pid:
          type: integer
          description: "PID before override; absent if key was already free."
    consumers: [operator]

  - name: claim_idempotent_reacquired
    description: "Same holder re-acquired a key it already owns (resume/restart path)."
    sources: [abi-loop, target, megawalk, megatron]
    data:
      required: [key, holder, pid, host, acquired_at, previous_acquired_at]
      properties:
        key:
          type: string
        holder:
          type: string
        pid:
          type: integer
        host:
          type: string
        acquired_at:
          type: integer
        expires_at:
          type: integer
        previous_acquired_at:
          type: integer
          description: "acquired_at on the prior claim - now superseded by the refresh."
    consumers: [operator]

  - name: claim_clock_skew_rejected
    description: "A refresh was rejected because computed expires_at landed in the past."
    sources: [abi-loop, target, megawalk, megatron]
    data:
      required: [key, now_ms, expires_at, reason]
      properties:
        key:
          type: string
        now_ms:
          type: integer
        expires_at:
          type: integer
        reason:
          type: string
    consumers: [operator]

  - name: session_satisfied
    description: "Signals that a target session's work is complete; alternative to <promise> tag emission. The stop hook scans for these and may auto-release the Stop hook when a fresh event matches the current session and the three-factor gates are still satisfied. Data.source is the constrained subsystem that produced the signal (check_pr, pr_merge, ci_watcher, abi_gate_manual, delegated); envelope source is the producer identity."
    sources: [target, megawalk, abi-loop, hook]
    data:
      required: [source, reason, session_id, gate_state_hash]
      properties:
        source:
          type: string
          enum: [check_pr, pr_merge, ci_watcher, abi_gate_manual, delegated]
          description: "Which constrained subsystem emitted this satisfaction signal"
        reason:
          type: string
          description: "Human-readable reason"
        evidence_url:
          type: string
          description: "Optional PR URL, review URL, CI URL"
        session_id:
          type: string
          description: "The target session id this satisfies"
        gate_state_hash:
          type: string
          description: "md5 of target-state.md at emit time. Stop hook ignores stale events whose hash no longer matches. For trigger=delegated this is audit-only: the close mechanism is manifest archival (not hash matching) because target-state.md no longer exists post-handoff."
    consumers: [hooks/target-stop-hook.sh]

  - name: auto_complete_triggered
    description: "The stop hook fired the auto-complete path based on a matching session_satisfied event. Audit-only record so the post-hoc review can count which auto-complete signals actually fired."
    sources: [hook]
    data:
      required: [source, session_id]
      properties:
        source:
          type: string
          enum: [check_pr, pr_merge, ci_watcher, abi_gate_manual, delegated]
          description: "Which session_satisfied data.source triggered this auto-complete"
        session_id:
          type: string
          description: "The target session id that auto-completed"
    consumers: [audit]

  - name: capture_add
    description: "An item was captured into the backlog capture tier (fu-* items below idea nodes; `fno backlog capture add`). Third honesty factor for the deferrals_captured gate: one capture_add OR capture_empty_pass per session satisfies factor 3 (legacy inbox_add/inbox_empty_pass rows also count)."
    sources: [backlog, target, hook]
    data:
      required: [session_id, fu_id]
      properties:
        session_id:
          type: string
          description: "target session id (or 'manual' when run standalone from a terminal)."
        fu_id:
          type: string
          description: "The minted fu-XXXXXX shortcode."
        title:
          type: string
        priority:
          type: string
          description: "p0|p1|p2|p3."
    consumers: [hooks/target-stop-hook.sh, scripts/lib/gate-audit.sh, scripts/lib/gates-reality.sh]

  - name: capture_empty_pass
    description: "An honest empty deferrals pass: nothing worth capturing this session. Satisfies the deferrals_captured gate's third factor without fabricating entries."
    sources: [backlog, target, hook]
    data:
      required: [session_id, reason]
      properties:
        session_id:
          type: string
        reason:
          type: string
          description: "Why nothing was captured (mandatory; anti-rubber-stamp)."
        scan_candidates:
          type: integer
          description: "Count of candidate lines the mechanical scan found. >0 with an empty-pass is an auditable yellow flag, not a hard block."
    consumers: [hooks/target-stop-hook.sh, scripts/lib/gate-audit.sh, scripts/lib/gates-reality.sh]

  - name: capture_scan
    description: "A mechanical regex pre-filter ran over a transcript and returned candidate deferral snippets. Telemetry; lets the audit record whether a scan preceded an empty-pass."
