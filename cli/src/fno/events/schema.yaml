  # ── loop-check target-stream events (Task 1.1) ──────────────────
  # Emitted by the Rust `fno-agents loop-check` verb and (for
  # loop_check_binary_missing) by the bash stop-hook shim. Source is always
  # "hook" (the stop hook fires them). These are target-stream events distinct
  # from the Branch B fno-agents daemon stream (KNOWN_EVENT_KINDS in lib.rs).
  # The event writer is named `append_loop_event` (not .emit / .emit_fields) to
  # avoid triggering the agents-schema parity scan.

  - name: loop_check
    description: "Appended on every stop-hook fire. Carries the 4-component fingerprint, fire count, decision, intent, and external-read summary."
    sources: [hook]
    data:
      required: [session_id, fingerprint, fires, consecutive_unchanged, decision, intent, pr_state, ci, reviewed]
      properties:
        session_id:
          type: string
          description: "Target session identifier from the manifest."
        fingerprint:
          type: string
          description: "4-component fingerprint: HEAD sha | pr_state | ci_conclusion | latest_review_or_comment_ts."
        fires:
          type: integer
          description: "Total stop-hook fires for this session (including this one)."
        consecutive_unchanged:
          type: integer
          description: "Consecutive fires with an identical fingerprint (including this one). Reaches N -> backstop."
        decision:
          type: string
          enum: [allow, block]
          description: "The decision made this fire."
        intent:
          type: string
          enum: [promise, aborted, backstop, none]
          description: "Intent detected in the transcript."
        intent_source:
          type: string
          enum: [payload, transcript]
          description: "Optional. Which channel produced the intent read: 'payload' = last_assistant_message from the Stop-hook stdin JSON (race-free, primary); 'transcript' = bounded fallback scan over the transcript file (payload absent: tool-call-only turn, old shim, or non-Claude harness). A fleet of 'transcript' sources after shim rollout signals a harness regression."
        pr_state:
          type: string
          description: "GitHub PR state: OPEN, MERGED, CLOSED, or none (no PR)."
        ci:
          type: string
          description: "CI conclusion: SUCCESS, FAILURE:<name>, PENDING, skipped, none, unknown."
        reviewed:
          type: boolean
          description: "True when every bot in config.review.required_bots has a completed review pass AND no blocking inline finding is unaddressed (step 2)."
        fp_read_failed:
          type: boolean
          description: "Optional. True when the fingerprint pre-read gh call hard-failed this fire (outage). The fingerprint was carried forward from the prior event; step 2 makes these fires transparent to the consecutive-unchanged streak."
        review_skipped:
          type: boolean
          description: "Optional (done-path fires). True when Reads 3+4 were skipped: per-session no_external or the repo declared required_bots: [] (AC3-UI observability)."
        unaddressed_blocking:
          type: integer
          description: "Optional (done-path fires). Count of blocking inline findings (codex P1 / gemini critical|high) whose thread lacks a qualifying ack."
    consumers: [operator]

  - name: termination
    description: "Emitted when the loop-check verb produces an allow decision that ends the session. Carries the TerminationReason enum value and (for Budget) the axis."
    sources: [hook]
    data:
      required: [session_id, reason, message]
      properties:
        session_id:
          type: string
          description: "Target session identifier."
        reason:
          type: string
          enum: [DonePRGreen, DoneAdvisory, DoneBatched, NoWork, Budget, NoProgress, Interrupted, Aborted]
          description: "TerminationReason enum value."
        axis:
          type: string
          enum: [wall_clock, cost]
          description: "Budget axis (wall_clock or cost). Present only when reason=Budget."
        message:
          type: string
          description: "Human-readable termination message."
    consumers: [operator, megawalk]

  - name: loop_check_gh_error
    description: "Emitted when a gh read fails during a loop-check fire. The fire returns block so the loop retries; this event is the forensic trail."
    sources: [hook]
    data:
      required: [session_id, read, stderr_tail]
      properties:
        session_id:
          type: string
          description: "Target session identifier."
        read:
          type: string
          description: "Which gh read failed: pr_view, pr_checks, pr_reviews, pr_reviews_parse, pulls_comments, pulls_comments_parse, pr_commits, pr_commits_parse, etc."
        stderr_tail:
          type: string
          description: "Last few lines of gh stderr, or empty string if unavailable."
    consumers: [operator]

  - name: loop_advisory_mode
    description: "Emitted each fire when the loop-check verb runs in advisory mode (gh binary absent, attended session). The verb still runs promise+budget checks but cannot read PR state."
    sources: [hook]
    data:
      required: [session_id, attended]
      properties:
        session_id:
          type: string
          description: "Target session identifier."
        attended:
          type: boolean
          description: "True when the manifest declared attended=true."
    consumers: [operator]

  - name: loop_check_binary_missing
    description: "Emitted by the bash stop-hook SHIM when the fno-agents binary cannot be found via any resolution path. The shim allows exit rather than creating an unrecoverable block loop."
    sources: [hook]
    data:
      required: [session_id]
      properties:
        session_id:
          type: string
          description: "Target session identifier (best-effort; may be empty if manifest unreadable)."
    consumers: [operator]

  - name: loop_check_legacy_manifest
    description: "Emitted once when the loop-check verb encounters a pre-wedge state file whose status field is COMPLETE, BLOCKED, or ABORTED. The verb allows exit for back-compat."
    sources: [hook]
    data:
      required: [session_id, status]
      properties:
        session_id:
          type: string
          description: "Target session identifier."
        status:
          type: string
          enum: [COMPLETE, BLOCKED, ABORTED]
          description: "Legacy status value found in the manifest."
    consumers: [operator]

  - name: loop_unit_dispatched
    description: "Emitted by the unified loop runtime (fno-agents loop run) before each unit dispatch."
    sources: [loop]
    data:
      required: [session_id, unit_id, iteration]
      properties:
        session_id:
          type: string
          description: "Correlation key for the dispatched session (matches data.session_id in the termination event)."
        unit_id:
          type: string
          description: "Identifier of the unit being dispatched (e.g. ab-XXXXXXXX for a backlog node)."
        iteration:
          type: integer
          description: "1-based iteration counter across all units in this walk."
        title:
          type: string
          description: "Optional human-readable title of the unit."
    consumers: [operator, megawalk]

  - name: node_failed
    description: "Synthesized by the per-unit watchdog when a dispatched session exits without a TerminationReason event. Group-2 walk policy counts these toward the consecutive-failure pause."
    sources: [loop]
    data:
      required: [session_id, unit_id, iteration, exit_code]
      properties:
        session_id:
          type: string
          description: "Correlation key for the session that exited without a termination event."
        unit_id:
          type: string
          description: "Identifier of the unit whose session exited unexpectedly."
        iteration:
          type: integer
          description: "Walk iteration at which this failure occurred."
        exit_code:
          type: integer
          description: "Exit code returned by the session. When the process died by signal N rather than a clean exit, this field carries 128+N (the shell convention: e.g. SIGTERM=15 -> 143, SIGKILL=9 -> 137)."
    consumers: [operator, megawalk]

  - name: walk_paused
    description: "Emitted by the unified loop runtime (run_loop) when walk policy requests a pause before loop_terminated(NoProgress). Carries the policy name and detail so operators can diagnose why the walk stopped early. Always followed by loop_terminated{reason: NoProgress} in the same walk. The legacy walker_paused kind (megawalk.py) maps to this."
    sources: [loop]
    data:
      required: [policy, detail, iterations_used, units_closed]
      properties:
        policy:
          type: string
          enum: [consecutive_failures, p0_failed]
          description: "Short tag identifying the walk policy that triggered the pause. consecutive_failures: streak of 3+ non-Done closes. p0_failed: a p0-priority unit closed with a non-Done reason."
        detail:
          type: string
          description: "Human-readable detail. For consecutive_failures: space-separated unit IDs in the streak. For p0_failed: the unit ID."
        iterations_used:
          type: integer
          description: "Walk iteration count at pause time."
        units_closed:
          type: integer
          description: "Number of units that reached the close step before the pause."
    consumers: [operator, megawalk]

  - name: node_closed
    description: "Emitted by the unified loop runtime after EVERY queue.close() call, including resume-guard closes (no dispatch occurred), normal termination closes, and per-unit cap parks. Provides per-unit close visibility in the event stream so TUI and progress-line consumers see close outcomes without polling queue state. The legacy node_complete and node_parked kinds (megawalk.py) map to this."
    sources: [loop]
    data:
      required: [unit_id, session_id, reason, close, detail, iterations_used]
      properties:
        unit_id:
          type: string
          description: "Identifier of the unit that was closed (e.g. ab-XXXXXXXX)."
        session_id:
          type: string
          description: "Correlation key for the session associated with this unit."
        reason:
          type: string
          description: "TerminationReason string from the evidence that drove the close (e.g. DonePRGreen, Budget, NoProgress)."
        close:
          type: string
          enum: [closed, parked, refused]
          description: "What the queue did: closed (node marked done), parked (deferred for retry), refused (queue rejected the close)."
        detail:
          type: string
          description: "Detail string from the Parked or Refused outcome; empty string for Closed."
        iterations_used:
          type: integer
          description: "Walk iteration count at close time."
    consumers: [operator, megawalk]

  - name: loop_terminated
    description: "The loop runtime's walk-level terminal event. Distinct from `termination` (a session's terminal event emitted by loop-check)."
    sources: [loop]
    data:
      required: [reason, iterations_used, units_closed]
      properties:
        reason:
          type: string
          enum: [DonePRGreen, DoneAdvisory, NoWork, Budget, NoProgress, Interrupted, Aborted]
          description: "Walk-level TerminationReason value."
        iterations_used:
          type: integer
          description: "Total iteration count consumed across all units in this walk."
        units_closed:
          type: integer
          description: "Number of units that reached the close step during this walk."
        axis:
          type: string
          enum: [iterations, wall_clock, cost]
          description: "Budget axis. Present only when reason=Budget."
        session_id:
          type: string
          description: "Optional session correlation key (populated when termination is triggered mid-unit)."
    consumers: [operator, megawalk]

  - name: delegated
    description: "Emitted by handoff.sh when a target session successfully delegates its remaining pipeline to a fresh successor session. Records the full lineage chain: node, from/to session pair, boundary type, and generation number. The terminal-session resolution rule (sec 2.5) follows these events to judge promise/completion for megawalk pre-advance verification."
    sources: [target]
    data:
      required: [node_id, from_session, to_session, boundary, generation]
      properties:
        node_id:
          type: string
          description: "The backlog graph node ID being delegated (e.g. ab-XXXXXXXX)."
        from_session:
          type: string
          description: "Session ID of the parent (delegating) session."
        to_session:
          type: string
          description: "Agent name of the spawned successor (e.g. tgt-1a2b3c4d-g2). Used by megawalk lineage resolution."
        child_session:
          type: string
          description: "Short session ID returned by fno agents spawn for the spawned child. May be empty if the registry row was confirmed by name lookup rather than by short-id."
        boundary:
          type: string
          description: "Pipeline boundary at which the handoff occurred (e.g. blueprint-do, wave)."
        generation:
          type: integer
          description: "Generation number of the successor session (parent is N-1; first handoff produces generation 2)."
        harness:
          type: string
          description: "Owning harness of the delegating (parent) lineage (codex/claude/gemini). Namespaces the successor name (tgt-<node>-<harness>-gN) and scopes the generation count per (node, harness) so two harnesses cannot collide on one registry name (x-3e70). Absent on pre-change events."
    consumers: [hooks/megawalk-stop-hook.sh, operator]

  - name: handoff_failed
    description: "Emitted by handoff.sh when the ordered succession protocol fails after any state mutation. Signals that the parent session has re-acquired its node claim and restored its target-state.md so it can continue in-session. The reason field indicates the failure stage."
    sources: [target]
    data:
      required: [node_id, session_id, reason]
      properties:
        node_id:
          type: string
          description: "The backlog graph node ID for which the handoff was attempted."
        session_id:
          type: string
          description: "Session ID of the parent session that attempted the handoff."
        reason:
          type: string
          description: "Machine-readable failure reason (e.g. spawn_failed, verify_timeout, release_failed, restore_failed)."
        detail:
          type: string
          description: "Optional human-readable detail about the failure (truncated to 200 chars)."
    consumers: [operator]

  - name: handoff_probe_unreadable
    description: "Emitted by handoff.sh when the context-probe.sh exits non-zero (transcript missing, unparseable, or jq unavailable) during precondition evaluation for a pressure boundary. The parent treats this as no-pressure and continues in-session. Observability signal so operators can detect silently-broken context monitoring."
    sources: [target]
    data:
      required: [node_id, session_id]
      properties:
        node_id:
          type: string
          description: "The backlog graph node ID for which the probe was attempted."
        session_id:
          type: string
          description: "Session ID of the parent session."
        probe_exit:
          type: integer
          description: "Exit code returned by context-probe.sh."
        transcript_path:
          type: string
          description: "Transcript path that was probed (best-effort; may be empty if manifest was unreadable)."
    consumers: [operator]

  - name: advance_dispatched
    description: "Emitted by `fno backlog advance` (merge-triggered auto-continue) when it dispatches a fresh background /target no-merge worker for the next now-unblocked node after a PR merge. Also emitted by advance_dependents when it dispatches a now-unblocked direct blocked_by dependent: cross-project into its own work-map repo (cross_project=true, G1) or same-project into its own project root (cross_project=false, RC1/x-33b2; work-map resolved, recorded cwd as fallback). Surfaced in the next SessionStart reconcile reminder line."
    sources: [backlog]
    data:
      required: [node_id]
      properties:
        node_id:
          type: string
          description: "The next backlog node dispatched (e.g. ab-XXXXXXXX)."
        short_id:
          type: string
          description: "Short id of the spawned claude bg worker (from the spawn receipt)."
        agent_name:
          type: string
          description: "Spawned agent name (target-<full-node-id>-<slug>)."
        closed_node_id:
          type: string
          description: "The just-merged node whose close triggered this advance (keying for AC1-RACE)."
        cross_project:
          type: boolean
          description: "True when this dispatch followed a blocked_by edge into a DIFFERENT project (G1 advance_dependents), spawned with --cwd the dependent's own work-map root. False for a same-project dispatch: either the next-node advance, or a same-project direct dependent spawned with --cwd its own project root (RC1/x-33b2; work-map resolved, recorded cwd as fallback)."
    consumers: [operator]

  - name: advance_skipped
    description: "Emitted by `fno backlog advance` (and advance_dependents) when it deliberately dispatches nothing. The reason discriminates disabled / no-work / walker-live / already-claimed / next-error / claim-error plus the dependent-path reasons unmapped-project / no-project / no-cwd / dependents-error / closed-project-unknown. Pure skips stay quiet to the user; dispatched/failed outcomes are the loud ones."
    sources: [backlog]
    data:
      required: [reason]
      properties:
        reason:
          type: string
          enum: [disabled, walker-live, no-work, already-claimed, next-error, claim-error, unmapped-project, no-project, no-cwd, dependents-error, closed-project-unknown, quota-deferred]
          description: "Why advance dispatched nothing this run. The dependent-path reasons (advance_dependents): unmapped-project = a cross-project dependent's project is not in config.work.workspaces (refused, not guessed); no-project = the dependent carries no project; no-cwd = a same-project dependent has no recorded cwd (fail-closed rather than guess canonical main, RC1/x-33b2); dependents-error = the graph read for direct dependents failed; closed-project-unknown = the closed node's project could not be resolved, so same- vs cross-project cannot be told apart and nothing is dispatched (fail-closed, RC2/x-33b2); quota-deferred = the node's resolved provider has no quota headroom and defer_dispatch is on (x-5d3e), so it stays ready until the reset."
        node_id:
          type: string
          description: "The candidate next node, when a reason references one (already-claimed, quota-deferred)."
        closed_node_id:
          type: string
          description: "The just-merged node whose close triggered this advance."
        provider:
          type: string
          description: "The resolved provider record id whose quota drove a quota-deferred skip (x-5d3e)."
        retry_at:
          type: number
          description: "Unix epoch seconds of the provider's window reset on a quota-deferred skip (x-5d3e)."
        detail:
          type: string
          description: "Optional human-readable detail (e.g. the next-error message), truncated."
    consumers: [operator]

  - name: advance_failed
    description: "Emitted by `fno backlog advance` when the worker spawn failed after the dispatch reservation was acquired. advance releases the node's dispatch reservation and the host op (reconcile/post-merge) still completes; the next SessionStart reconcile retries (AC2-FR). Surfaced loudly in the next reconcile reminder."
    sources: [backlog]
    data:
      required: [node_id, error]
      properties:
        node_id:
          type: string
          description: "The node whose worker spawn failed."
        error:
          type: string
          description: "Failure detail (truncated to 200 chars)."
        closed_node_id:
          type: string
          description: "The just-merged node whose close triggered this advance."
    consumers: [operator]

  - name: quota_deferred
    description: "Emitted by an autonomous dispatcher (mux grab / active-backlog tick) when a ready node is NOT dispatched because its resolved provider has no quota headroom (EXHAUSTED, or LOW with a reset inside the defer horizon). Quota-aware dispatch (x-5d3e). The node is left untouched in ready; the first tick after retry_at dispatches it. Advisory + opt-in (config.providers.quota.defer_dispatch); p0 and explicit human verbs never defer."
    sources: [backlog]
    data:
      required: [node_id, provider, headroom]
      properties:
        node_id:
          type: string
          description: "The ready node held back this tick."
        provider:
          type: string
          description: "The resolved provider record id whose quota drove the defer."
        headroom:
          type: string
          enum: [exhausted, low]
          description: "The headroom state that triggered the defer."
        retry_at:
          type: number
          description: "Unix epoch seconds of the binding window's reset; the tick after this dispatches the node."
    consumers: [operator]

  - name: think_spawned
    description: "Emitted by a dispatch trigger (x-6a10 born-with-why birth, or x-122a A2 lifecycle: work-start / retro-at-done) when an away/headless session spawns a fire-and-forget context-carrying /think bg worker for the node. The node is then stamped with the spawned think's session pointer."
    sources: [backlog]
    data:
      required: [node_id, think_session]
      properties:
        node_id:
          type: string
          description: "The freshly-filed node a /think was spawned for."
        trigger:
          type: string
          enum: [birth, work-start, retro, conversational]
          description: "Which dispatch moment fired: birth (A1), work-start or retro (A2 lifecycle, x-122a), or conversational (C explicit verb, x-0a9c)."
        think_session:
          type: string
          description: "Short id of the spawned claude /think bg worker (from the spawn receipt)."
        presence:
          type: string
          enum: [away, attended]
          description: "Presence classification that routed to an autonomous spawn: 'away' (headless), or 'attended' when an operator opted in via config.think_spawn.attended=spawn (x-5d51 B)."
        resolved:
          type: boolean
          description: "Whether the origin transcript pointer resolved to a real .jsonl (false => seeded from the stored triple)."
        output_path:
          type: ["string", "null"]
          description: "Durable sidecar (briefs_dir()/think-<id>.md) the worker is told to write its /think doc to, also stamped on the node (x-5d51 B); null when the path could not be resolved."
        agent_name:
          type: string
          description: "Spawned agent name (think-<node-id>-<slug>)."
    consumers: [operator]

  - name: think_offered
    description: "Emitted by the node-birth path (x-6a10) when an attended operator is present: a single copy-pasteable /think <node-id> handoff line is surfaced rather than an autonomous spawn."
    sources: [backlog]
    data:
      required: [node_id]
      properties:
        node_id:
          type: string
          description: "The freshly-filed node a /think handoff was offered for."
        trigger:
          type: string
          enum: [birth, work-start, retro, conversational]
          description: "Which dispatch moment fired: birth (A1), work-start or retro (A2 lifecycle, x-122a), or conversational (C explicit verb, x-0a9c)."
        presence:
          type: string
          enum: [attended]
          description: "Presence classification (always 'attended' for an offer)."
        resolved:
          type: boolean
          description: "Whether the origin transcript pointer resolved (false => bare /think line, AC2-ERR)."
        offer_line:
          type: string
          description: "The single copy-pasteable handoff line surfaced to the operator."
    consumers: [operator]

  - name: think_skipped
    description: "Emitted by a dispatch trigger (x-6a10 birth, x-122a A2 lifecycle) when it deliberately spawns/offers nothing. The reason discriminates no-origin / bulk-intake / cap-exceeded / already-claimed / claim-error / spawn-failed / no-node-id / unresolved-pointer (A2 relevance filter) / daily-cap (A2 per-day ceiling). A gate-off evaluation emits NOTHING (no-op); this fires only when the gate is on."
    sources: [backlog]
    data:
      required: [reason]
      properties:
        reason:
          type: string
          enum: [no-origin, bulk-intake, cap-exceeded, already-claimed, claim-error, spawn-failed, no-node-id, unresolved-pointer, daily-cap]
          description: "Why the dispatch spawned/offered nothing this evaluation."
        trigger:
          type: string
          enum: [birth, work-start, retro, conversational]
          description: "Which dispatch moment fired: birth (A1), work-start or retro (A2 lifecycle, x-122a), or conversational (C explicit verb, x-0a9c)."
        node_id:
          type: string
          description: "The candidate node, when the reason references one."
        presence:
          type: string
          enum: [attended, away]
          description: "Presence classification, when one was reached before the skip."
        resolved:
          type: boolean
          description: "Origin-resolution flag, when the seed was assembled before the skip."
        detail:
          type: string
          description: "Optional human-readable detail (e.g. the spawn error), truncated."
    consumers: [operator]

  - name: pr_watch_dispatched
    description: "PR-state watcher successfully fired a headless claude skill for one PR (either /fno:pr merged or /fno:pr check)."
    sources: [daemon]
    data:
      required: [kind, pr]
      properties:
        kind:
          type: string
          enum: [review, merge]
          description: "Which skill was fired: 'review' for /fno:pr check, 'merge' for /fno:pr merged."
        pr:
          type: integer
          description: "GitHub PR number."

  - name: pr_watch_skipped
    description: "PR-state watcher skipped a candidate PR this tick without firing (no local checkout, or a live node/walker claim owns it)."
    sources: [daemon]
    data:
      required: [pr, reason]
      properties:
        pr:
          type: integer
          description: "GitHub PR number."
        reason:
          type: string
          description: "Why this PR was skipped: 'no-checkout' (repo_dir missing/absent), 'claimed' (live node: or walker: claim)."

  - name: pr_watch_dispatch_failed
    description: "A headless claude skill fired by the PR-state watcher returned an error (rc != 0, is_error:true, or non-JSON stdout). The PR will be retried on the next tick."
    sources: [daemon]
    data:
      required: [pr, retries]
      properties:
        pr:
          type: integer
          description: "GitHub PR number."
        retries:
          type: integer
          description: "Consecutive failure count for this PR after this failure (1-based)."

  - name: pr_watch_parked
    description: "PR-state watcher stopped polling a PR because it was closed, exceeded max age, or exhausted retries."
    sources: [daemon]
    data:
      required: [pr, reason]
      properties:
        pr:
          type: integer
          description: "GitHub PR number."
        reason:
          type: string
          description: "Why the PR was parked: 'closed', 'max-age', 'retries-exhausted', or decide()'s park reason."

  - name: pr_watch_tick
    description: "Heartbeat emitted at the end of every PR-state watcher poll interval, including quiet ticks with no actionable PRs."
    sources: [daemon]
    data:
      required: [open_prs, acted]
      properties:
        open_prs:
          type: integer
          description: "Total number of open-PR candidates discovered from the graph this tick."
        acted:
          type: integer
          description: "Number of PRs for which a skill was successfully dispatched this tick."

  - name: recovery_nudge
    description: "Session auto-recovery (x-f47c) injected a resume nudge into a footnote-launched bg session that was idle-but-incomplete after an abnormal turn termination."
    sources: [daemon]
    data:
      required: [short_id, nudge_count]
      properties:
        short_id:
          type: string
          description: "The 8-hex jobId of the recovered bg session."
        nudge_count:
          type: integer
          description: "How many nudges this session has now received (1-based; capped by config.recovery.max_nudges)."

  - name: recovery_skipped
    description: "Session auto-recovery looked at an idle-stale bg session and deliberately did NOT nudge it (waiting on a human, unreachable socket, or a failed send)."
    sources: [daemon]
    data:
      required: [short_id, reason]
      properties:
        short_id:
          type: string
          description: "The 8-hex jobId of the bg session that was spared."
        reason:
          type: string
          description: "Why the nudge was skipped: needs-input | socket-unreachable | send-failed."
        error:
          type: string
          description: "The send failure detail; present only when reason=send-failed."

  - name: recovery_capped
    description: "Session auto-recovery reached the per-session nudge cap (config.recovery.max_nudges); no further nudges fire for this session. Emitted once on the transition, not every tick."
    sources: [daemon]
    data:
      required: [short_id, nudges]
      properties:
        short_id:
          type: string
          description: "The 8-hex jobId of the bg session that hit the cap."
        nudges:
          type: integer
          description: "The nudge count at which the cap was reached (== config.recovery.max_nudges)."

  - name: human_touch
    description: "A human steered an agent-managed node (W4 touch telemetry). Emitted at exactly three choke points: mux keystroke injection into an agent pane (source=inject, coalesced per pane), answer-queue submission (source=answer), and a manual merge (source=merge: tty `fno pr merge` or reconcile closing an out-of-band merge). Observing never counts; steering always counts. Emit is fire-and-forget non-fatal: a failed emit must never touch the steering path."
    sources: [daemon, target, backlog, test]
    data:
      required: [graph_node_id, source, resolution]
      properties:
        graph_node_id:
          type: string
          description: "Node the steering targeted; ALWAYS present, null when resolution=failed (provenance missing) - both validators accept a present-null required field. Null events are counted, not dropped - dropped events are the silent failure."
        source:
          type: string
          enum: [inject, answer, merge]
          description: "Which steering choke point fired."
        resolution:
          type: string
          enum: [ok, failed]
          description: "ok when graph_node_id resolved (pane FNO_NODE provenance / graph pr_number match / reconcile record); failed otherwise."

  - name: verifier_verdict
    description: "Ship-gate verifier advisory verdict (W6 x-f063): the plan-AC check ran against the ship diff at finalize time. Advisory only - no code path may gate a ship on it (Locked Decision #6). One event per ship; `fno scoreboard --calibration` joins these to per-node outcomes to measure the verifier's false-positive rate before anyone proposes flipping it to a gate. error = the verifier itself failed (spawn/timeout/parse); not_applicable = doc ship, no plan bound, or no ACs to check."
    sources: [target, test]
    data:
      required: [graph_node_id, verdict, source]
      properties:
        graph_node_id:
          type: [string, "null"]
          description: "Node the ship belongs to; null when the manifest carried none (present-null required field, same convention as human_touch)."
        verdict:
          type: string
          enum: [pass, concerns, fail, error, not_applicable]
          description: "The verifier's judgment of plan ACs vs the origin/main...HEAD diff."
        source:
          type: string
          enum: [ship-gate]
          description: "Execution site; ship-gate is the only emitter today."
        pr_number:
          type: [integer, "null"]
          description: "PR the ship landed as (best-effort gh lookup; null offline)."
        session_id:
          type: string
          description: "Target session that shipped; joins to the ledger row."

  - name: skill_eval_finding
    description: "Observer harness (x-57a5): one scored corpus item for a sweep or replay run. Corpus construction is a read-time fold over already-captured signals (ledger/graph/events) - this event is the observer's own new activity, not retroactive instrumentation of history. One event per (run_id, corpus_item_id) pair; a replay batch tags skill_ref so a before/after comparison is a filter over this event type."
    sources: [observer, test]
    data:
      required: [run_id, skill_id, skill_version, corpus_item_id, dimension, verdict, evidence, cost_usd]
      properties:
        run_id:
          type: string
          description: "obs-<skill_id>-<UTC-timestamp>, minted once per sweep/replay-batch; correlates every finding in a run to its terminal skill_eval_run_complete."
        skill_id:
          type: string
          description: "Skill under evaluation, e.g. fno:blueprint or fno:review - same id fno scoreboard --by-skill (x-4829) emits."
        skill_version:
          type: string
          description: "Best-effort git hash of the skill's SKILL.md at the corpus item's timestamp, or 'unknown' - x-4829's convention, reused verbatim."
        corpus_item_id:
          type: string
          description: "The historical session's real session_id - no new ID scheme is minted for corpus items."
        dimension:
          type: string
          enum: [structural_validity, collision_free, shipped_outcome, finding_precision]
          description: "Which rubric dimension this finding scores. structural_validity/collision_free/shipped_outcome are blueprint dimensions (replay scores the first two only, per Review Amendment A1); finding_precision is the review dimension (sweep-only, per Review Amendment A2)."
        verdict:
          type: string
          enum: [pass, degraded, fail]
          description: "pass = clean signal; degraded = ambiguous (execution-attributable postmortem, or a discrepancy-path resolution); fail = a clear miss (plan-attributable postmortem, reverted/bounced, or a declined-and-never-contradicted finding)."
        evidence:
          type: string
          description: "<=500 chars: what specifically drove the verdict (earned-specificity discipline - no vague attribution)."
        cost_usd:
          type: number
          description: "Spend attributable to producing this finding: 0 for a sweep item (read-only fold), the headless spawn's cost for a replay item."
        skill_ref:
          type: [string, "null"]
          description: "Git ref under test; absent/null for a retrospective sweep against HEAD, present for a replay batch against a candidate branch."
        tool_fault:
          type: boolean
          description: "True when this finding records a REPLAY tool fault (spawn crash/timeout/unparseable output) rather than a skill-quality verdict. Downstream (x-0ca7) MUST exclude tool_fault=true findings from skill failure rankings (AC2-ERR: a tool fault is never conflated with a skill-quality fail). Absent = a genuine skill-quality verdict."

  - name: skill_eval_run_complete
    description: "Observer harness (x-57a5): the terminal event for one sweep or replay batch - the trigger x-0ca7's loop tick scans for. Never emitted when the corpus is insufficient (<10 attributable runs); an insufficient run reports its state on stdout only, with no terminal event, since there is nothing to complete."
    sources: [observer, test]
    data:
      required: [run_id, skill_id, skill_version, corpus_size, pass_count, degraded_count, fail_count, cost_usd, coverage_pct, failure_ranking]
      properties:
        run_id:
          type: string
          description: "Same run_id minted at sweep/replay-batch start; correlates to every skill_eval_finding in this run."
        skill_id:
          type: string
          description: "Skill evaluated, e.g. fno:blueprint or fno:review."
        skill_version:
          type: string
          description: "Best-effort git hash of the skill's SKILL.md, or 'unknown' - x-4829's convention."
        corpus_size:
          type: integer
          description: "Count of attributable corpus items actually scored in this run (post coverage-gap exclusion)."
        pass_count:
          type: integer
          description: "Findings with verdict=pass across the run."
        degraded_count:
          type: integer
          description: "Findings with verdict=degraded across the run."
        fail_count:
          type: integer
          description: "Findings with verdict=fail across the run."
        cost_usd:
          type: number
          description: "Total spend for the run: 0 for a sweep, the sum of per-item headless-spawn costs for a replay batch."
        coverage_pct:
          type: integer
          description: "Attributable-and-scored fraction of the window's total rows, 0-100 - the same coverage-honesty rule fno scoreboard already enforces, carried into this event since x-0ca7's original proposal did not have one."
        failure_ranking:
          type: array
          description: "[{dimension, fail_count}] sorted by fail_count descending - only the dimensions actually scorable in this run (a replay batch's ranking carries structural_validity/collision_free only, per Review Amendment A1)."
        skill_ref:
          type: [string, "null"]
          description: "Git ref under test; absent/null for a retrospective sweep against HEAD, present for a replay batch."

  - name: loop_tick
    description: "A standing loop (x-ce71 substrate) ran one tick. The proposer (x-0ca7) is the first live loop to emit this; fno loops ls reads it for the last-tick column. Emitted whether or not the tick did anything (paused / no-work ticks still record)."
    sources: [skill_diff, test]
    data:
      required: [name]
      properties:
        name:
          type: string
          description: "The loop's config.loops.<name> key, e.g. skill_diff_proposer."
        level:
          type: string
          description: "The loop's resolved level at tick time (report|assisted|unattended)."
        outcome:
          type: string
          description: "One word: paused | no-work | noop | proposed | no-diff-helps | report."

  - name: skill_diff_proposed
    description: "Skill-diff proposer (x-0ca7): a cited diff to a skill's files was opened as a PR through the normal review gate. One per (run_id, skill_id) - the idempotency key the next tick scans for."
    sources: [skill_diff, test]
    data:
      required: [run_id, skill_id, pr_number, branch, cited_finding_ids, added_lines, removed_lines]
      properties:
        run_id:
          type: string
          description: "The observer run_complete run_id this diff responds to."
        skill_id:
          type: string
          description: "Skill the diff targets, e.g. fno:blueprint."
        skill_version_observed:
          type: string
          description: "Skill SKILL.md hash the observer scored against (from run_complete), or 'unknown'."
        skill_version_proposed_against:
          type: string
          description: "Skill SKILL.md hash the proposer actually diffed against at run time (AC9-FR: may differ if the file drifted since the observer's snapshot)."
        pr_number:
          type: [integer, "null"]
          description: "The opened PR number; null if gh lookup failed after a successful push."
        branch:
          type: string
          description: "The feature branch the diff landed on."
        cited_finding_ids:
          type: array
          description: "Every finding_id cited across the surviving hunks (citation invariant: non-empty)."
        added_lines:
          type: integer
          description: "Lines added across the diff (bloat-tracker input)."
        removed_lines:
          type: integer
          description: "Lines removed/modified across the diff (0 = additive-only)."
        justification:
          type: [string, "null"]
          description: "Present when the diff was additive-only over threshold (AC4-UI); null otherwise."

  - name: skill_diff_no_diff_helps
    description: "Skill-diff proposer (x-0ca7): the proposer concluded no diff helps (local-maxima ceiling AC7-EDGE, or every hunk dropped as uncited AC2-ERR) and filed a backlog node instead of opening a PR. Records the idempotency key so the run_id is not reprocessed."
    sources: [skill_diff, test]
    data:
      required: [run_id, skill_id, reason]
      properties:
        run_id:
          type: string
          description: "The observer run_complete run_id."
        skill_id:
          type: string
          description: "Skill evaluated."
        reason:
          type: string
          description: "Why no diff was proposed: local_maxima | all_hunks_uncited | synth_no_diff | redaction_refused."
        filed_node_id:
          type: [string, "null"]
          description: "The backlog node filed (architectural finding), or null if filing failed (retried next tick)."

  - name: skill_diff_noop
    description: "Skill-diff proposer (x-0ca7): an observer run had zero actionable findings (AC6-EDGE). A lightweight record so the run_id is not reprocessed on the next tick - no diff, no PR, no node."
    sources: [skill_diff, test]
    data:
      required: [run_id, skill_id]
      properties:
        run_id:
          type: string
          description: "The observer run_complete run_id closed as a no-op."
        skill_id:
          type: string
          description: "Skill evaluated."
        reason:
          type: string
          description: "zero_findings | zero_failures."

  - name: skill_diff_eval_closed
    description: "Skill-diff proposer (x-0ca7): a proposer-authored PR merged and the observer re-ran over the same corpus slice, producing a before/after delta - the receipt that the loop actually closed (Locked Decision 7 / AC10-FR)."
    sources: [skill_diff, test]
    data:
      required: [pr_number, skill_id, run_id_before]
      properties:
        pr_number:
          type: integer
          description: "The merged proposer PR."
        skill_id:
          type: string
          description: "Skill the diff targeted."
        run_id_before:
          type: string
          description: "The observer run that motivated the diff."
        run_id_after:
          type: [string, "null"]
          description: "The post-merge re-eval run; null if the re-run has been scheduled but not yet completed."
        score_delta:
          type: [number, "null"]
          description: "fail_count(before) - fail_count(after) on the top dimension; null until run_id_after lands. STRUCTURAL only on replay pairs (Review Amendment A1)."

  - name: gate_escape
    description: "A human resolved what a gate should have (an oob-merge past an unmet required-bot gate, a spawn-cap bypass, a hand-rebase, a wedge unblock). The autonomy-debt counter (x-f894): retro ranks escapes by reason so the roadmap knows which reliability fix pays first. Telemetry fails OPEN - a failed emit never blocks the host op. Tier-1 (reconcile auto) emits reason=dead-bot; the manual catch-all is `fno event emit --type gate_escape --data '{\"reason\":\"other\",\"detail\":\"...\"}'`."
    sources: [backlog, target, daemon, hook, test]
    data:
      required: [reason]
      properties:
        reason:
          type: string
          enum: [dead-bot, flake, stale-base, wedge, spawn-cap, other]
          description: "Which intervention. Small, summable enum; fail-closed on unknown so a typo is loud, not a silent 'other'."
        pr:
          type: integer
          description: "PR the escape rode on (attribution; optional). Dedup key with reason."
        graph_node_id:
          type: string
          description: "Node the escape rode on (attribution; optional)."
        detail:
          type: string
          description: "Free text, especially for reason=other; retro flags an empty detail as low-signal (optional)."
        dedup_key:
          type: string
          description: "PR-less dedup bucket (reason:session:day) for a spawn-cap/manual escape with no `pr`. Collapses a looped intervention to one count (x-91b5); not consumed by retro (optional)."
    consumers: [fno retro run]

  - name: executor_resolved
    description: "The /do three-tier executor resolver (skills/do/scripts/resolve-executor.sh) decided a task's executor. Best-effort telemetry: routing is byte-identical whether or not this emits (x-64cb). Folded into `fno backlog triage health` as tier distribution + inference share + warn-fallback count + override-after-inference rate."
    sources: [target, test]
    data:
      required: [resolved, tier]
      properties:
        task:
          type: string
          description: "Task id being resolved (e.g. '1.2'); empty when the caller did not pass TASK_ID."
        plan_path:
          type: string
          description: "Plan the task belongs to; empty when the caller did not pass PLAN_PATH."
        resolved:
          type: string
          description: "The resolved executor name (do | impeccable) after alias-normalization and the fail-closed check."
        tier:
          type: string
          enum: [task-block, plan-frontmatter, surface-inference, default]
          description: "Which resolution tier decided (documented contract; producer is a fixed case in resolve-executor.sh)."
        warn_fallback:
          type: boolean
          description: "True when an unknown executor triggered the WARN fail-closed to 'do'."
    consumers: [fno backlog triage health]

  - name: triage_applied
    description: "A `fno backlog triage apply` mutation committed to the graph. Best-effort telemetry emitted after locked_mutate_graph (x-64cb): triage semantics are unchanged whether or not this emits. Makes _validate_proposal's silent drops a first-class number. Folded into `fno backlog triage health` as per-category apply counts + validation drop rate."
    sources: [backlog, target, test]
    data:
      required: [applied, proposed, dropped]
      properties:
        applied:
          type: object
          description: "Per-category applied counts: priority_changes, dependencies, duplicates_flagged, deferred."
        priority_moves:
          type: array
          description: "Per-node priority transitions [{id, from, to}] that landed."
          items:
            type: object
        proposed:
          type: integer
          description: "Total proposal entries seen across all categories (the drop-rate denominator)."
        dropped:
          type: integer
          description: "Entries dropped by _validate_proposal (unknown id, cycle, invalid priority, missing reason). Today's silent fail-open becomes a visible number."
    consumers: [fno backlog triage health]

# ---------------------------------------------------------------------------
# x-2901: daemon kinds present in KNOWN_EVENT_KINDS but previously undocumented
# here. schema.yaml is now the single cross-language name registry (the
# events-v3.json kind enum was retired), so the parity gate asserts every
# KNOWN_EVENT_KINDS entry appears here. Documented sources: [daemon] keeps the
# python collision-exclusion bucket honest (_collect_event_types drops
# daemon/subagent-only names); the real envelope source varies (dispatch_deferred
# emits from megawalk, active_backlog_task_crashed from active-backlog).
# ---------------------------------------------------------------------------

  - name: active_backlog_task_crashed
    description: "The active-backlog dispatch task panicked/exited unexpectedly; the daemon logged it and continues."
    sources: [daemon]
    data:
      required: []
      properties:
        error:
          type: string

  - name: daemon_exe_fingerprint_unavailable
    description: "The daemon could not read its own executable fingerprint (staleness self-check degraded to fail-open)."
    sources: [daemon]
    data:
      required: []
      properties: {}

  - name: dispatch_deferred
    description: "A cross-harness dispatch was deferred because the node is owned by a different harness (dispatch-posture guard)."
    sources: [daemon]
    data:
      required: []
      properties:
        node_id:
          type: string
        owner_harness:
          type: string
        dispatcher_harness:
          type: string

  - name: screen_state_change
    description: "A scrape sweep observed an agent's on-screen verdict change (badge set or cleared). Consumed by the mux subscribe overlay."
    sources: [daemon]
    data:
      required: []
      properties:
        name:
          type: string
        state:
          type: string
        rule:
          type: string
        seq:
          type: integer
        cleared:
          type: boolean

  - name: startup_reconcile_done
    description: "The daemon's startup reconcile sweep completed successfully."
    sources: [daemon]
    data:
      required: []
      properties:
        count:
          type: integer

  - name: startup_reconcile_failed
    description: "The daemon's startup reconcile sweep raised an error; the daemon continues fail-open."
    sources: [daemon]
    data:
      required: []
      properties:
        error:
          type: string

  # ── a2a status breakpoints: task-boundary protocol family (x-dbaf) ──────────
  # Four task-boundary events carrying the extended envelope in `protocol_family`
  # below (routable fields at envelope level, not smeared into `data`). The
  # public contract is schemas/events-protocol-v1.json; docs/protocol/a2a-status-events.md.
  - name: task_started
    description: "The do-phase orchestrator is about to dispatch a task to its executor. A tick (pulled from events.jsonl, never pushed)."
    sources: [target, subagent, test]
    data:
      required: []
      properties:
        title:
          type: string
          description: "Task title, truncated to the reason/title cap."
        executor:
          type: string
          description: "Resolved executor (do | tdd | impeccable | ...)."
        wave:
          type: string
          description: "Wave id the task belongs to, when the plan declares waves."
    consumers: [x-05da peek, third-party observers]

  - name: task_done
    description: "An executor returned and its result was parsed. Carries the return-contract outcome at envelope level. A tick (pulled, never pushed)."
    sources: [target, subagent, test]
    data:
      required: []
      properties:
        commit:
          type: string
          description: "Commit sha the task produced, when it committed."
        concerns:
          type: integer
          description: "Count of DONE_WITH_CONCERNS findings, 0 when none."
    consumers: [x-05da peek, third-party observers]

  - name: blocked
    description: "A task returned RESULT: BLOCKED, or an in-session <help> distress was emitted. The one event that requests action; PUSHED to the parent handle when spawn lineage exists."
    sources: [target, subagent, test]
    data:
      required: []
      properties:
        reason:
          type: string
          description: "Why it blocked, truncated to the reason cap."
        evidence:
          type: string
          description: "Pointer to evidence (path/url), truncated to the reason cap."
    consumers: [parent handle via mail bus, x-05da peek]

  - name: run_summary
    description: "The loop reached terminal (finalize path). Carries per-run task counts + termination reason. Emitted natively in Rust. PUSHED to the parent handle when spawn lineage exists."
    sources: [target, hook, test]
    data:
      required: [tasks_started, tasks_done, tasks_failed]
      properties:
        tasks_started:
          type: integer
        tasks_done:
          type: integer
        tasks_failed:
          type: integer
        termination_reason:
          type: string
          description: "The loop's TerminationReason (DonePRGreen | NoProgress | Budget | ...)."
        pr_url:
          type: string
          description: "The run's PR url, when one exists."
    consumers: [parent handle via mail bus, x-05da peek, third-party observers]

# Size cap per Failure Modes (Boundaries): the system rejects events whose
# data payload exceeds 64KB. Validators enforce this at validate() time.
limits:
  max_data_bytes: 65536

# ── a2a status-breakpoint protocol family (x-dbaf) ──────────────────────────
# The four types above carry an EXTENDED envelope: routable fields live at
# envelope level (an observer routes 'notify me when MY worker blocks' on them),
# only type-specific payload stays in `data`. This section is the validator's
# source of truth for the family; the self-contained public artifact is
# schemas/events-protocol-v1.json (kept in sync by test_protocol_family.py).
#
# Rule: additionalProperties:false at envelope level for this family ONLY;
# legacy types keep today's tolerance.
protocol_family:
  version: 1                       # `v` on the wire; additive-only within v:1
  types: [task_started, task_done, blocked, run_summary]
  envelope:
    # Every top-level key a family event may carry. additionalProperties:false
    # rejects anything outside this whitelist.
    allowed: [ts, v, type, source, from, model, host, project, node, task, run, parent, outcome, data]
    # Always required, on top of the base [ts, type, source, data].
    required: [v, run]
  # `outcome` (return-contract enum) is present ONLY on these types, and required
  # there; forbidden on task_started/blocked. (Key is `present_on`, not `on`:
  # YAML 1.1 parses a bare `on:` key as the boolean True.)
  outcome:
    enum: [SUCCESS, DONE_WITH_CONCERNS, FAILED, BLOCKED]
    present_on: [task_done, run_summary]
