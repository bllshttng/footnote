# ---------------------------------------------------------------------------
# W7 additive: Rust fno-agents supervisor event kinds.
# These are emitted by the Rust daemon/workers to events.jsonl with kind
# (not type) and source daemon or worker:<id>. They are documented here so
# the Python/bash validators stop treating them as undocumented events.
# No existing entry above is modified.
# ---------------------------------------------------------------------------

  - name: daemon_started
    description: "fno-agents daemon process started and initialized successfully."
    sources: [daemon]
    data:
      required: []
      properties:
        pid:
          type: integer
          description: "Daemon process ID."
        version:
          type: string
          description: "Binary version string."

  - name: daemon_exited
    description: "fno-agents daemon process exited (clean shutdown or crash)."
    sources: [daemon]
    data:
      required: []
      properties:
        reason:
          type: string
          description: "Exit reason (e.g. 'sigterm', 'idle', 'error')."

  - name: daemon_idle_pending_exit
    description: "Daemon has no live agents and is counting down to idle exit."
    sources: [daemon]
    data:
      required: []
      properties: {}

  - name: daemon_shutting_down
    description: "Daemon received shutdown signal and is winding down."
    sources: [daemon]
    data:
      required: []
      properties:
        reason:
          type: string

  - name: daemon_state
    description: "Periodic daemon health snapshot (agent count, memory, etc.)."
    sources: [daemon]
    data:
      required: []
      properties:
        state:
          type: object
          description: "Arbitrary daemon state snapshot."

  - name: agent_spawned
    description: "A new PTY-managed agent worker process was spawned."
    sources: [daemon]
    data:
      required: []
      properties:
        name:
          type: string
        short_id:
          type: string
        provider:
          type: string
        pid:
          type: integer
        # Parent-edge provenance (x-30f6): the spawning session's ambient env,
        # captured at launch so a worker can be traced BACK to the conversation
        # that decided to spawn it. All optional; absent for legacy spawns.
        spawned_by_session:
          type: string
          description: "Parent session id (e.g. CLAUDE_CODE_SESSION_ID) ambient at spawn time."
        spawned_by_harness:
          type: string
          description: "Parent harness: claude | codex | gemini (from env)."
        spawned_by_cwd:
          type: string
          description: "Parent cwd, used by the per-harness transcript-path resolver."

  - name: agent_stopped
    description: "An agent was stopped (graceful SIGTERM sequence completed)."
    sources: [daemon]
    data:
      required: []
      properties:
        name:
          type: string
        short_id:
          type: string
        reason:
          type: string

  - name: agent_exited
    description: "An agent worker process exited (child process exit detected)."
    sources: [subagent]
    data:
      required: []
      properties:
        name:
          type: string
        short_id:
          type: string
        exit_code:
          type: integer

  - name: agent_removed
    description: "An agent registry entry was removed (fno-agents rm)."
    sources: [daemon]
    data:
      required: []
      properties:
        name:
          type: string
        short_id:
          type: string

  - name: agent_inconsistent
    description: "Agent state is inconsistent (missing state.json, unexpected status, etc.)."
    sources: [daemon]
    data:
      required: []
      properties:
        name:
          type: string
        short_id:
          type: string
        reason:
          type: string
          description: "Inconsistency reason (e.g. missing_state_json, daemon_restart)."

  - name: agent_ask_done
    description: "An fno-agents ask RPC completed; agent replied."
    sources: [daemon]
    data:
      required: []
      properties:
        name:
          type: string
        short_id:
          type: string
        duration_ms:
          type: integer

  - name: channel_registered
    description: "An MCP channel was registered for an agent."
    sources: [daemon]
    data:
      required: []
      properties:
        name:
          type: string
        mcp_channel_id:
          type: string
        backend:
          type: string

  - name: inside_leg_report
    description: "Signal that an inside-leg state push (E3.2) was stored. Carries session_id/seq/state; the full stored report (reason/ttl_ms/received_at) lives on the matching claude registry row, which is the audit source -- this event is not a reconstruction record."
    sources: [daemon]
    data:
      required: [session_id, seq, state]
      properties:
        session_id:
          type: string
        seq:
          type: integer
        state:
          type: string
          enum: [working, blocked, done]

  - name: inside_leg_report_dropped
    description: "An inside-leg report was dropped without storing it (stale seq, unknown session, or the early-push buffer was full)."
    sources: [daemon]
    data:
      required: [session_id, seq, reason]
      properties:
        session_id:
          type: string
        seq:
          type: integer
        reason:
          type: string
          enum: [stale_seq, unknown_session, buffer_full]
        last_seq:
          type: integer

  - name: inside_leg_report_buffered
    description: "Buffer-on-early-push (E3.3): a report arrived before its session's registry row existed and was held in the bounded pending buffer, to be flushed onto the row at creation."
    sources: [daemon]
    data:
      required: [session_id, seq, state]
      properties:
        session_id:
          type: string
        seq:
          type: integer
        state:
          type: string
          enum: [working, blocked, done]

  - name: inside_leg_buffer_flushed
    description: "Buffer-on-early-push (E3.3): a buffered early-push report was flushed onto its session's registry row at row creation."
    sources: [daemon]
    data:
      required: [name, session_id, state, seq]
      properties:
        name:
          type: string
        session_id:
          type: string
        state:
          type: string
          enum: [working, blocked, done]
        seq:
          type: integer

  - name: inside_leg_completed
    description: "Ordered exit teardown (E3.3, AC-X2-4): a claude row carrying an inside-leg report is transitioning to Exited. Emitted BEFORE the registry write clears the report, so list/waiters observe the final state before the badge goes blank."
    sources: [daemon]
    data:
      required: [name, final_state, seq]
      properties:
        name:
          type: string
        session_id:
          type: string
        final_state:
          type: string
          enum: [working, blocked, done]
        seq:
          type: integer

  - name: drive_attached
    description: "An interactive drive window was opened for an agent."
