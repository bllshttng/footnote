# footnote config reference (config.example.toml)
#
# Generated by `fno config schema --toml` from the Pydantic SettingsModel
# (the single source of truth). Do not edit by hand; edit the model +
# cli/src/fno/config/registry.py and regenerate.
#
# Every key is shown set to its DEFAULT. Copy the keys you want to change
# into .fno/config.toml (project-local) or ~/.fno/config.toml (global);
# anything you omit falls back to these defaults. config.toml is flat:
# top-level scalars and [blocks], no wrapper. Optional keys with no
# default are shown commented out (TOML has no null).
#
# For opinionated starters (recommended values, safe opt-ins on), see
# docs/config.global.example.toml and docs/config.local.example.toml.

# Root dir for global fno state.
state_dir = "~/.fno/"
# Where folder plans are written.
plans_dir = ".fno/plans/"
# Plan/design-doc filename template: strftime codes plus {slug} and {node} placeholders; must render to a bare *.md name.
plans_filename = "%Y%m%d-{slug}-{node}.md"
# Per-loop level overrides: {<name>: {level: report|assisted|unattended}} (default report).
loops = {}
# Status-fanout subscribers: list of {name, type (json-webhook|text-webhook|backlog-progress), events, match, url|url_env, template, field, cloudevents, enabled}.
status_sinks = []
# Settings schema version; managed by fno, not hand-set.
schema_version = 1

[branch]
# Prefix for dispatched worktree branches: <prefix>/<slug>-<node>.
prefix = "fno"

[paths]
# Override path to the backlog graph.json.
# graph_json = <unset>   # optional; no default
# Override path to ledger.json.
# ledger_json = <unset>   # optional; no default
# Override path to the evals-history.jsonl bank-run ledger.
# evals_history = <unset>   # optional; no default
# Override path to the sidecar briefs dir.
# briefs_dir = <unset>   # optional; no default
# Override path to the megatron fleet dir.
# fleet_dir = <unset>   # optional; no default
# Override path to the postmortems dir.
# postmortems_dir = <unset>   # optional; no default
# Override base dir for worktrees.
# worktrees_base = <unset>   # optional; no default
# Override path to the memory dir.
# memory_dir = <unset>   # optional; no default
# Override path to hook logs.
# hook_logs_dir = <unset>   # optional; no default
# Override path to the cross-project messaging inbox dir.
# inbox_dir = <unset>   # optional; no default
# Override path to the capture-tier inbox/parking-lot file.
# inbox_path = <unset>   # optional; no default
# Override path to the agents registry.json.
# agents_registry_path = <unset>   # optional; no default
# Override path to the handoffs dir.
# handoffs_dir = <unset>   # optional; no default
# Override path to the retro-pending dir.
# retro_pending_dir = <unset>   # optional; no default
# Override path to the cross-project mail bus dir.
# bus_dir = <unset>   # optional; no default
# Override path to the loops pause-all sentinel.
# loops_paused_json = <unset>   # optional; no default
# Override path to the observer harness digest dir.
# observer_reports_dir = <unset>   # optional; no default

[obsidian]
# Whether this project uses an Obsidian vault for plans/docs.
enabled = false
# Vault area name (NOT a filesystem path).
# vault = <unset>   # optional; no default

[project]
# Project identifier.
# id = <unset>   # optional; no default
# One-paragraph statement of what this codebase is and why.
# vision = <unset>   # optional; no default

[inbox]
# Seconds past which a sent-but-unclaimed bus message is surfaced back to its sender (turn-boundary nudge + `fno mail status`).
unclaimed_ttl = 1800

[blueprint]
# Default cap on group PRs per decomposed epic; an epic plan-doc's max_children frontmatter overrides it per-epic and --max-prs may only tighten it.
max_prs_per_epic = 4

[backlog]
# Prefix for minted node IDs (<=7 chars; not cv-/fu-/tgt-).
# id_prefix = <unset>   # optional; no default
# Hex width of minted node IDs (4-8).
id_hex_width = 8
# Age (days) before an unmoved ready node is quarantined from selection.
staleness_days = 21

[backlog.maintain]
# Age (days) before an idea is flagged stale.
staleness_days = 30
# Consecutive failures before a node auto-defers.
max_failed_attempts = 3
# Age (days) before a stale idea enters the validity sweep.
validity_days = 60
# Oldest-first validity-sweep batch size (clamped to 100).
validity_batch_size = 25

[batch]
# Coalesce same-domain nodes into one batch PR (opt-in).
enabled = false
# Nodes per batch before it closes (default 3).
max_nodes = 3
# Optional cumulative-diff LOC ceiling for a batch (off by default).
# max_loc = <unset>   # optional; no default

[post_merge]
# Per-repo vault parking-lot path for the post-merge ritual (repo-relative).
# parking_lot_path = <unset>   # optional; no default
# Whether the post-merge ritual runs.
enabled = true
# Whether a post-merge watcher self-reaps.
self_reap = false
# Canonical-sync incantation run via `bash -lc` after a merge (e.g. `git checkout main && git pull && fno update && fno restart`). Unset = off.
# sync_command = <unset>   # optional; no default
# Repo-relative fnmatch globs gating the canonical sync (empty = always run; e.g. `["cli/**", "crates/**"]` skips a docs-only merge).
sync_paths = []
# Let merge-detection auto-dispatch the /fno:pr merged ritual for a newly-merged PR (opt-in; default off).
auto_run = false
# How far back the canonical-sync catch-up sweep looks for merges with no sync marker (default 3 days). Bounds the sweep so a fresh clone never re-syncs all history.
catchup_window_days = 3
# How long the newest merge may sit unsynced before `fno doctor` reports the canonical checkout stale (default 24h).
sync_stale_hours = 24
# Model for post-merge ritual workers (default claude-sonnet-5). Routing wins when a secondary provider is keyed.
model = "claude-sonnet-5"

[research]
# Landing dir for the `fno research` doc deliverable (brief + sources sidecar); vault area, not repo-relative. Unset => ship fails loud (never guesses).
# output_dir = <unset>   # optional; no default

[review]
# GitHub App bot logins that must have reviewed before the ship gate goes green (the GATE). Legacy alias: required_bots.
# github_apps = <unset>   # optional; no default
# Legacy alias for config.review.github_apps (a straight rename); github_apps wins if both are set.
# required_bots = <unset>   # optional; no default
# Harness peers (codex/gemini/...) run locally that post a real PR review under peer_identity and gate like github_apps. Scalar or {provider, identity, token_env} map entries.
peers = []
# The distinct machine-account login peers post their review under (must not be the author account).
# peer_identity = <unset>   # optional; no default
# Env var holding the PAT for peer_identity used to post peer reviews to the PR.
# peer_token_env = <unset>   # optional; no default
# Reviewer logins honored-if-present but NOT required: the gate never waits for them (kills the App-bot usage-limit wedge), but a blocking finding from one still holds it.
optional_apps = []
# Local-attestation reviewers (sigma | /code-review | declare) that produce no GitHub review: loop-check accepts a head-pinned review_attestation event as gate evidence. Lets a solo/claude-only harness express a real gate with no App bot.
reviewers = []
# Which AI reviewers /pr requests a review from (the INVOCATION list).
external_reviewers = []
# Per-agent provider routing for the cross-model review panel.
agent_providers = {}

[review.cross_model]
# Enable cross-model (codex/gemini) second-opinion review.
enabled = false

[target]
# Opt-in cleanup of provably-dead duplicate state files.
dedupe_dead_duplicates = false
# Auto-launch a bg /target worker when a node reaches ready via /blueprint.
auto_launch_on_blueprint = false

[target.handoff]
# Enable target self-handoff at pipeline boundaries.
enabled = true
# Context-used %% that triggers a wave-boundary handoff.
used_pct_trigger = 50
# Max handoff generations before refusing further delegation.
generation_cap = 4

[target.blast]
# Enable blast-radius routing.
enabled = false
# Allow token-saving downgrades in blast routing.
downgrade = true
# Include loc-ratchet globs in the blast map.
reuse_loc_manifest = true
# Per-project high-blast glob extensions.
high_blast_globs = []

[target.defaults]
# Session-input default: skip external review (size-profile driven).
no_external = false
# Session-input default: skip docs (size-profile driven).
no_docs = false
# Session-input default: max pipeline iterations.
max_iterations = 40

[agents]
# Per-verb spawn-defaults overlay keyed by the seed's leading slash-verb (agents.profiles.<verb>.{provider,model,effort,substrate,permission_mode}), one rung above agents.defaults in precedence. The verb key is the seed's first token, /-stripped and fno:-namespace-stripped, lowercase (/fno:think and /think resolve alike). No content-based inference; a table with no matching verb resolves exactly as agents.defaults.
profiles = {}
# Agent-launch confirmation policy (auto/always/never).
confirm = "auto"
# Auto-join every hand-started session to the roster at SessionStart (default false = opt-in via /fno-me). Spawned workers register regardless.
auto_register_sessions = false
# Authorize `fno agents crown` from an unattended session with no superset crown (a standing, level-0-equivalent human grant; DEFAULT OFF). Authorizes the grant path only - never bypasses the self-grant / one-live-crown-per-scope refusals.
crown_config_grant = false
# Seconds a finished agent-view row stays before dead-row GC reaps it (default 3600).
dead_row_grace = 3600
# Cap on concurrent live worker processes (fno registry + claude roster union); spawn queues at cap (default 3).
max_live = 3
# Available-RAM floor in GB for spawn preflight; spawn refuses below it (<= 0 disables; default 4).
min_free_gb = 4.0
# Worker CPU/IO priority: utility (background QoS, default) or off.
worker_qos = "utility"
# Default --permission-mode for autonomous dispatchers only (dispatch-node.sh / backlog advance / think dispatch); defaults to bypassPermissions so fire-and-forget workers skip the worktree-entry prompt. An explicit flag wins; opt out with an explicit "" (forward nothing) or "default" (prompt positively). Claude-native, fail-closed at the spawn seam.
spawn_permission_mode = "bypassPermissions"

[agents.a2a]
# Allow agents to auto-open agent-to-agent threads.
auto = true
# Max turns in an agent-to-agent thread.
turn_ceiling = 6

[agents.defaults]
# Default provider for bare `fno agents spawn` / `/agent spawn` (claude/codex/gemini/agy/opencode); an explicit -p flag wins, empty = unset (harness inference then claude). Validated at the spawn seam.
provider = ""
# Default model for bare spawns, forwarded as --model but provider-scoped: an unbound model (no agents.defaults.provider) is scoped to the builtin default provider (claude), NOT the ambient harness, so a spawn resolving to a different provider (e.g. a codex-ambient session, or an explicit -p codex) leaves the model to that harness rather than forcing an incompatible one that 400s after the round-trip. Bind agents.defaults.provider (or set a per-provider model) to apply a model under a non-claude harness. An explicit -m flag always wins; empty = unset (provider default). Passthrough (provider CLIs own model names).
model = ""
# Default reasoning effort for bare spawns (minimal|low|medium|high|xhigh|max); an explicit --effort wins, empty = unset. Config-sourced effort degrades open on providers with no effort surface (gemini/agy).
effort = ""
# Default substrate for bare spawns (pane|bg|headless); an explicit substrate wins, empty = unset (per-provider default). Config-sourced value degrades open with a warning if incompatible with the resolved provider (e.g. bg is claude-only).
substrate = ""
# Default --permission-mode for bare spawns; an explicit flag wins, empty = unset. Config-sourced value degrades open with a warning if the resolved provider cannot map it (an explicit --permission-mode stays fail-closed).
permission_mode = ""

[agents.codex]
# Use full-yolo (drop sandbox) for headless codex workers.
headless_yolo = false

[agents.gemini]
# Use full-yolo (drop sandbox) for headless gemini workers.
headless_yolo = false

[dispatch]
# Default dispatch harness (claude|codex|gemini|agy|opencode); empty = claude. Overlays the harness-capability map.
harness = ""
# Default dispatch substrate (bg|headless|pane); empty = per-harness default (claude=bg, else headless).
substrate = ""
# Dispatch command template with a single {id}; empty = '/target no-merge {id}'. Written in canonical claude slash syntax and normalized per-harness at resolve (a leading /verb becomes $fno:verb on codex, /fno:verb on opencode, and is refused on the deprecated gemini); a non-slash template passes through literally.
command = ""
# Verb allowlist a node's dispatch_verb must match or the resolver refuses (default: /target, /think).
allowed_verbs = ["/target", "/think"]
# Per-project merge posture for autonomous dispatch. Default false = no-merge (a fresh install is unchanged); true lets dispatched /target workers merge (still gated by config.auto_merge.* review). An explicit --allow-merge/--no-merge flag wins; any non-bool value degrades to false.
auto_merge = false
# On provider exhaustion during autonomous dispatch: 'defer' (default; a fresh install is unchanged) waits for headroom; 'failover' rotates to the next non-exhausted provider in the active combo. A full-combo exhaustion falls back to defer; any unknown value degrades to 'defer'.
on_exhaustion = "defer"

[auto_continue]
# Auto-dispatch the next ready node after a PR merges.
enabled = false

[keep_going]
# Autonomous keep-going: the merged-PR ritual classifies surviving carve-outs and dispatches follow-up /think or /target work (firehose-capped via think_spawn.daily_cap).
enabled = false

[think_spawn]
# Born-with-why: spawn/offer a context-carrying /think for a generated idea node.
enabled = false
# Blast-radius cap on /think spawns per node-generation run.
max_per_run = 5
# Idle seconds before an attended operator downgrades to away (0 = off).
idle_threshold_s = 0
# A2: dispatch a context /think when /target claims a node to work it (default OFF).
on_work_start = false
# A2: dispatch a context /think when `fno backlog done` closes a node (default OFF).
on_retro = false
# Per-install per-day ceiling on /think spawns (firehose guard; 0 = off).
daily_cap = 20
# Attended born-with-why behavior: 'offer' (default, handoff line) or 'spawn' (real bg /think).
attended = "offer"

[active_backlog]
# Always-on backlog drain: true (every project) or a per-project map.
enabled = false
# Poll-floor cadence for the drain daemon (e.g. 5m, 30s).
interval = "5m"
# Consecutive dispatch failures before a node is parked.
failure_limit = 3
# In-flight nodes per project per tick (v1 == 1).
max_concurrent = 1
# Scope the drain daemon to a single mission's nodes.
# mission = <unset>   # optional; no default

[parallel]
# Max concurrent parallel-mode lanes (0/1 = sequential, >=2 opts in).
max_lanes = 1

[auto_merge]
# Auto-merge a PR once external review passes.
enabled = false
# Merge strategy: merge | squash | rebase.
merge_strategy = "merge"
# Delete the branch after an auto-merge.
delete_branch_on_merge = true
# Require CI green before auto-merge.
require_checks_pass = true
# Conflict-resolution agent for auto-merge rebases.
conflict_resolution = "opus"
# Post-failure remediation policy for auto-merge.
remediation = "attempt"

[pr_watch]
# Enable the global PR-state watcher daemon.
enabled = false
# PR-watcher poll interval (seconds).
interval_seconds = 600
# PR-watcher consecutive-failure park threshold.
retries = 3
# PR-watcher: park PRs older than N days.
max_age_days = 14
# Claude model used for headless PR-watcher skill fires.
model = "claude-haiku-4-5"

[recovery]
# Enable the session auto-recovery watchdog (resumes idle-but-incomplete bg sessions; rides the pr_watch tick).
enabled = true
# How stale a bg session must be before a resume nudge fires (seconds).
idle_threshold_seconds = 900
# Per-session cap on resume nudges before the watchdog gives up.
max_nudges = 3

[health_monitor]
# Enable backlog health monitoring.
enabled = true

[health_monitor.thresholds]
# Breach threshold: idea pile depth.
idea_pile_depth = 25
# Breach threshold: stale-ready age (days).
stale_ready_days = 30
# Breach threshold: failure-prone attempts.
failure_prone_attempts = 2
# Breach threshold: collision count.
collision_count = 3
# Breach threshold: project/cwd mismatch count.
project_cwd_mismatch = 0
# Breach threshold: fraction of open features with no mission edge (1.0 = off).
orphan_feature_rate = 1.0

[health_monitor.notifications]
# Health notification surfaces (terminal/discord/webhook/log_only).
surfaces = ["terminal"]
# Discord channel for health notifications.
# discord_channel = <unset>   # optional; no default
# Webhook URL for health notifications.
# webhook_url = <unset>   # optional; no default
# Health notification throttle (minutes).
throttle_minutes = 60

[health_monitor.history]
# Append health-history entries.
enabled = true
# Override health-history path.
# path = <unset>   # optional; no default
# Health-history retention (days).
retain_days = 90

[collision.severity_thresholds]
# Collision scoring: high-severity shared-file count.
high_count = 3
# Collision scoring: high-severity shared-file ratio.
high_ratio = 0.5
# Collision scoring: medium-severity shared-file count.
medium_count = 2
# Collision scoring: medium-severity shared-file ratio.
medium_ratio = 0.25

[work]
# Workspace -> project topology map (config.work.workspaces.<slug>.projects[]). A project entry may carry a `worktree` key (never|harness-native|external) overriding config.worktree.policy.
workspaces = {}

[worktree]
# Global worktree-isolation policy (never|harness-native|external); default harness-native. `never` launches code payloads in place (e.g. an Obsidian vault checkout). A per-project work.workspaces.<slug>.projects[].worktree key overrides it.
# policy = <unset>   # optional; no default

[model_routing]
# Route auxiliary roles (coordinate/tidy/orient/consolidate/post-merge) and the opt-in build lane to a secondary provider at spawn.
enabled = true
# Secondary providers (name -> {protocol, base_url, api_key_env, api_key_file, haiku_model, wire_api}); 'zai' is built in.
providers = {}
# Per-role target map (role -> 'provider/model', e.g. tidy: 'zai/glm-4.7'; legacy 'provider,model' comma form also accepted); manage via `fno route set/unset`. The opt-in 'build' lane routes delivery spawns (/target bg).
roles = {}
# Extra env merged into routed spawns (e.g. API_TIMEOUT_MS, per-tier model overrides).
extra_env = {}

[mux]
# Auto-inject OSC 133 block markers into mux-spawned shells: mux-panes (default) | off. Never edits your global shell rc.
shell_integration = "mux-panes"
# Fire an OS notification when an agent badge enters 'blocked' (default on).
notify_on_blocked = true
# Also notify on a terminal 'done' hook transition (default off).
notify_on_done = false
# Show a 'while you were gone' catch-up digest overlay on attach after an absence (default on).
attach_digest = true
# Minutes since last detach before the catch-up digest overlay shows (default 10).
attach_digest_threshold_min = 10
# Focus-follows-mouse: hovering a coding pane makes it the keyboard focus after a short settle (default on).
hover_focus = true

[dev]
# Maintainer pin: a checkout root the Rust bootstrap re-provisions from (uv tool install <path>/cli) instead of the PyPI wheel when its tool venv is wiped. Unset = PyPI self-provision (end-user default).
source = ""

[status_fanout]
# Seconds between status-fanout ticks per project (daemon host).
interval_secs = 5
# Bounded per-webhook HTTP timeout for a status sink.
http_timeout_secs = 5
# Retry budget per webhook dispatch before drop/short-circuit.
retries = 2
