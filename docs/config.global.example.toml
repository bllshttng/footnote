# footnote GLOBAL config starter  ->  copy to ~/.fno/config.toml
#
# Global config is the baseline shared by EVERY footnote project on this
# machine. Each project's .fno/config.toml is deep-merged on top, so a project
# overrides only the keys it needs. Any key may live in either file; the split
# between this file and config.local.example.toml is the typical home, not a
# rule.
#
# This is an opinionated QUICKSTART with recommended values. Absent keys fall
# back to their code defaults (every one of the ~100 settings has a default),
# so you only keep the lines you actually want to change. For the COMPLETE list
# of every setting and its code default, see docs/config.example.toml.
#
# config.toml is flat: top-level scalars and [blocks], no wrapper. Code defaults
# for the opt-in features below are `false`; the lines here turn on the safe
# productivity ones. Billing- and safety-sensitive features stay off (see the
# commented block at the bottom).

# --- recommended productivity defaults (code default: false) ---
[auto_continue]
enabled = true          # merge-triggered auto-continue of the ready backlog

[think_spawn]
enabled = true          # born-with-why: spawn a /think for generated ideas

# Your standing cross-model review panel, used by /review. If it's the same
# across all your repos, set it once here; a project can still override.
[review]
# which AI reviewers /pr REQUESTS (the invocation list)
external_reviewers = ["gemini", "codex"]
# The completion GATE: which reviews must land before a session is 'done'.
# Distinct from external_reviewers above (that only ASKS; this DECIDES done).
# App-bot logins that MUST review (empty/absent = no hard gate); gemini is reliable.
github_apps = ["gemini-code-assist"]
# honored-if-present: counts if it reviews, never WAITS on it (so a codex
# usage-limit wedge can't stall you).
optional_apps = ["chatgpt-codex-connector"]
# peers: run a review CLI locally and post it under a distinct machine account
# (own quota, needs a PAT); gates like an App bot. Uncomment to require
# codex/gemini this way instead of via the GitHub App:
# peers = ["codex", "gemini"]
# peer_identity = "fno-peer-bot"     # the distinct login peers post under (NOT your account)
# peer_token_env = "GH_PEER_TOKEN"   # env var holding that account's PAT
# reviewers: local reviewers that produce NO GitHub review - loop-check reads a
# head-pinned attestation event instead. Lets a solo/claude-only harness (no App
# bot) express a real gate. One of sigma | /code-review | declare. Uncomment:
# reviewers = ["sigma"]

# Worktree placement for every repo on this machine: <base>/<repo>/<name>.
# Leave unset for the harness-native <repo>/.claude/worktrees/<name>.
[paths]
worktrees_base = "~/conductor/workspaces"

# --- these already default ON; listed so you know the knobs exist ---
[recovery]
enabled = true          # background-session auto-recovery

[health_monitor]
enabled = true          # backlog health metrics + thresholds

[model_routing]
enabled = true          # role/provider routing

# The fno mux (terminal multiplexer) UX knobs - machine-wide, so global is
# their home. All default ON except notify_on_done; listed here so you know
# they exist (the mux has no other discovery surface). Flip any to change it.
[mux]
hover_focus = true                # focus-follows-mouse: hover a pane to type in it (false = click to focus)
shell_integration = "mux-panes"   # inject OSC 133 block markers into mux-spawned shells; 'off' to disable
attach_digest = true              # 'while you were gone' catch-up overlay when you re-attach after an absence
attach_digest_threshold_min = 10  # ...only after an absence longer than this many minutes
notify_on_blocked = true          # OS notification when an agent badge enters 'blocked'
notify_on_done = false            # ...and on a terminal 'done' (opt-in - flip to true to hear about finishes)

# Read by hooks/worktree-setup.sh from the TOP-LEVEL [worktree] block (the hook
# greps it; it never looks inside another table). Keep this key at top level.
[worktree]
auto_install = true       # run dep install on new worktrees; false to skip

# --- opt-in / safety-sensitive: OFF on purpose. Uncomment to enable. ---
# [auto_merge]
# enabled = true          # auto-merge once external review passes (BILLING)
# [pr_watch]
# enabled = true          # poll PRs and implement external review
# [active_backlog]
# enabled = true          # continuous board-drain daemon
# [review.cross_model]
# enabled = true          # route sigma-review agents to a second provider
# [agents.codex]
# headless_yolo = true    # SAFETY: bypasses codex sandbox prompts
# [agents.gemini]
# headless_yolo = true
